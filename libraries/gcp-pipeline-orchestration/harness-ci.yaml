pipeline:
  name: gcp-pipeline-orchestration CI
  identifier: gcp_pipeline_orchestration_ci
  projectIdentifier: legacy_migration_reference
  orgIdentifier: default
  tags:
    library: orchestration
    type: python

  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: gcp-pipeline-orchestration
        build:
          type: branch
          spec:
            branch: main

  triggers:
    - trigger:
        name: On Orchestration Change
        identifier: on_orchestration_change
        type: Webhook
        spec:
          type: Github
          spec:
            type: Push
            spec:
              connectorRef: github_connector
              autoAbortPreviousExecutions: true
              filter:
                branch:
                  include:
                    - main
                paths:
                  include:
                    - libraries/gcp-pipeline-orchestration/**

  stages:
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Unit Tests
                  identifier: run_tests
                  spec:
                    connectorRef: docker_hub
                    image: python:3.11
                    shell: Bash
                    command: |
                      # Install core library dependency (assumes available in Artifact Registry or git)
                      pip install gcp-pipeline-core
                      
                      pip install -e .[dev]
                      PYTHONPATH=src pytest tests/unit/ -v --tb=short
