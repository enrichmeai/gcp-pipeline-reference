pipeline:
  name: Libraries Root Pipeline
  identifier: libraries_root_pipeline
  projectIdentifier: legacy_migration_reference # UPDATE to your Project ID
  orgIdentifier: default # UPDATE to your Org ID
  description: Root pipeline to orchestrate CI for all libraries

  stages:
    - stage:
        name: Unified Tagging
        identifier: unified_tagging
        type: CI
        spec:
          cloneCodebase: true
          infrastructure: # Use infrastructure if cloud runtime is not enough
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: <+input>
          execution:
            steps:
              - step:
                  type: Run
                  name: Create Monorepo Tag
                  identifier: create_tag
                  spec:
                    connectorRef: github_connector # UPDATE to your Github Connector
                    image: alpine/git:latest
                    shell: Bash
                    command: |
                      # Logic to create a unified tag for all libraries
                      VERSION=$(cat version.txt 2>/dev/null || echo "1.0.<+pipeline.sequenceId>")
                      TAG="libs-${VERSION}"
                      echo "Creating tag ${TAG}"
                      git tag ${TAG}
                      git push origin ${TAG}

    - stage:
        name: Core Library CI
        identifier: core_library_ci
        type: Pipeline
        spec:
          pipelineRef: gcp_pipeline_core_ci
          isTriggeredPipeline: true
          # The individual pipeline is located at libraries/gcp-pipeline-core/harness-ci.yaml

    - stage:
        name: Beam Library CI
        identifier: beam_library_ci
        type: Pipeline
        spec:
          pipelineRef: gcp_pipeline_beam_ci
          isTriggeredPipeline: true
          # The individual pipeline is located at libraries/gcp-pipeline-beam/harness-ci.yaml

    - stage:
        name: Orchestration Library CI
        identifier: orchestration_library_ci
        type: Pipeline
        spec:
          pipelineRef: gcp_pipeline_orchestration_ci
          isTriggeredPipeline: true
          # The individual pipeline is located at libraries/gcp-pipeline-orchestration/harness-ci.yaml

    - stage:
        name: Transform Library CI
        identifier: transform_library_ci
        type: Pipeline
        spec:
          pipelineRef: gcp_pipeline_transform_ci
          isTriggeredPipeline: true
          # The individual pipeline is located at libraries/gcp-pipeline-transform/harness-ci.yaml

    - stage:
        name: Tester Library CI
        identifier: tester_library_ci
        type: Pipeline
        spec:
          pipelineRef: gcp_pipeline_tester_ci
          isTriggeredPipeline: true
          # The individual pipeline is located at libraries/gcp-pipeline-tester/harness-ci.yaml
