pipeline:
  name: gcp-pipeline-tester CI
  identifier: gcp_pipeline_tester_ci
  projectIdentifier: legacy_migration_reference # UPDATE to your Project ID
  orgIdentifier: default # UPDATE to your Org ID
  tags:
    library: tester
    type: python

  properties:
    ci:
      codebase:
        connectorRef: github_connector # UPDATE to your Github Connector
        repoName: gcp-pipeline-libraries # Name of the new libraries repository
        build:
          type: branch
          spec:
            branch: main

  triggers:
    - trigger:
        name: On Tester Change
        identifier: on_tester_change
        type: Webhook
        spec:
          type: Github
          spec:
            type: Push
            spec:
              connectorRef: github_connector
              autoAbortPreviousExecutions: true
              filter:
                branch:
                  include:
                    - main
                paths:
                  include:
                    - libraries/gcp-pipeline-tester/**

  stages:
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Unit Tests
                  identifier: run_tests
                  spec:
                    connectorRef: docker_hub
                    image: python:3.11
                    shell: Bash
                    command: |
                      pip install -e .[dev]
                      PYTHONPATH=src pytest tests/unit/ -v --tb=short
