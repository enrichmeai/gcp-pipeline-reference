name: 'spanner_transformation'
version: '1.0.0'
config-version: 2

profile: 'spanner_transformation'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros", "shared_macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  run_id: "manual_run"
  spanner_connection_id: "project.location.spanner-conn"
  spanner_table_name: "customers"

models:
  spanner_transformation:
    fdp:
      +materialized: table
      +schema: fdp_spanner
