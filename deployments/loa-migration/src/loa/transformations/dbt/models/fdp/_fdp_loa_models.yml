version: 2

models:
  - name: event_transaction_excess
    description: |
      LOA FDP 1: Event Transaction Excess
      
      SPLIT from odp_loa.applications (filter: event_type IS NOT NULL)
      
      Contains:
      - Event attributes (event_type, event_date, event_status)
      - Transaction attributes (transaction_id, transaction_amount, etc.)
      - Excess attributes (excess_amount, excess_reason, excess_status)
      
      Key Difference from EM:
      - EM uses JOIN (3 sources → 1 FDP)
      - LOA uses SPLIT (1 source → 2 FDP tables)

    columns:
      - name: event_key
        description: "Composite key: application_id-event_type-event_date"
        tests:
          - not_null
          - unique
      - name: application_id
        description: "Application identifier"
        tests:
          - not_null
      - name: event_type
        description: "Event type"
      - name: event_date
        description: "Event date"
      - name: event_status
        description: "Event status"
      - name: transaction_id
        description: "Transaction identifier"
      - name: transaction_amount
        description: "Transaction amount"
      - name: transaction_date
        description: "Transaction date"
      - name: transaction_type
        description: "Transaction type"
      - name: excess_amount
        description: "Excess amount"
      - name: excess_reason
        description: "Reason for excess"
      - name: excess_status
        description: "Excess status"
      - name: _run_id
        description: "Pipeline run ID"
        tests:
          - not_null
      - name: _extract_date
        description: "Extract date"
        tests:
          - not_null
      - name: _transformed_at
        description: "Transformation timestamp"

  - name: portfolio_account_excess
    description: |
      LOA FDP 2: Portfolio Account Excess
      
      SPLIT from odp_loa.applications (filter: portfolio_id IS NOT NULL)
      
      Contains:
      - Portfolio attributes (portfolio_id, portfolio_name, portfolio_type)
      - Account attributes (account_id, account_number, account_type, account_status)
      - Excess attributes (excess_amount, excess_category, excess_threshold)
      
      Key Difference from EM:
      - EM uses JOIN (3 sources → 1 FDP)
      - LOA uses SPLIT (1 source → 2 FDP tables)

    columns:
      - name: portfolio_key
        description: "Composite key: portfolio_id-account_id"
        tests:
          - not_null
          - unique
      - name: portfolio_id
        description: "Portfolio identifier"
        tests:
          - not_null
      - name: portfolio_name
        description: "Portfolio name"
      - name: portfolio_type
        description: "Portfolio type"
      - name: account_id
        description: "Account identifier"
      - name: account_number
        description: "Account number"
      - name: account_type
        description: "Account type"
      - name: account_status
        description: "Account status"
      - name: excess_amount
        description: "Excess amount"
      - name: excess_category
        description: "Excess category"
      - name: excess_threshold
        description: "Excess threshold"
      - name: application_id
        description: "Application identifier (reference)"
      - name: _run_id
        description: "Pipeline run ID"
        tests:
          - not_null
      - name: _extract_date
        description: "Extract date"
        tests:
          - not_null
      - name: _transformed_at
        description: "Transformation timestamp"

