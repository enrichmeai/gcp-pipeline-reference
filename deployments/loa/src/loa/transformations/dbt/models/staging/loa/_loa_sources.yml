version: 2

sources:
  - name: odp_loa
    database: "{{ var('gcp_project_id') }}"
    schema: odp_loa
    description: "LOA Original Data Product - Raw 1:1 copy of mainframe data"

    tables:
      - name: applications
        description: "Loan application records from mainframe"
        columns:
          - name: application_id
            description: "Unique application identifier"
            tests:
              - not_null
              - unique
          - name: customer_id
            description: "Customer identifier"
            tests:
              - not_null
          - name: application_date
            description: "Date application was submitted"
            tests:
              - not_null
          - name: application_type
            description: "Type: NEW, REFINANCE, MODIFICATION, RENEWAL"
          - name: application_status
            description: "Status: PENDING, APPROVED, DECLINED, CANCELLED, COMPLETED"
          - name: loan_amount
            description: "Requested loan amount"
          - name: loan_term
            description: "Loan term in months"
          - name: interest_rate
            description: "Interest rate as percentage"
          - name: portfolio_id
            description: "Portfolio identifier"
          - name: portfolio_name
            description: "Portfolio name"
          - name: portfolio_type
            description: "Portfolio type"
          - name: account_id
            description: "Account identifier"
          - name: account_number
            description: "Account number"
          - name: account_type
            description: "Account type"
          - name: account_status
            description: "Account status"
          - name: event_type
            description: "Event type"
          - name: event_date
            description: "Event date"
          - name: event_status
            description: "Event status"
          - name: transaction_id
            description: "Transaction identifier"
          - name: transaction_amount
            description: "Transaction amount"
          - name: transaction_date
            description: "Transaction date"
          - name: transaction_type
            description: "Transaction type"
          - name: excess_amount
            description: "Excess amount"
          - name: excess_reason
            description: "Reason for excess"
          - name: excess_status
            description: "Excess status"
          - name: excess_category
            description: "Excess category"
          - name: excess_threshold
            description: "Excess threshold"
          # Audit columns
          - name: _run_id
            description: "Pipeline run ID"
          - name: _source_file
            description: "Source file path"
          - name: _processed_at
            description: "Processing timestamp"
          - name: _extract_date
            description: "Extract date from HDR record"

