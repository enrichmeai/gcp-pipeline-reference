# BigQuery Direct Migration Configuration
# This uses Google Cloud's Data Transfer Service for direct database-to-database migration
# NO intermediate files needed!

# Source database (Teradata example)
source:
  source_type: teradata  # Options: teradata, oracle, mysql, postgresql
  host: teradata.company.com
  database: PROD_DB
  user: ${TERADATA_USER}        # Use environment variable
  password: ${TERADATA_PASSWORD} # Use environment variable
  # port: 1025  # Optional, defaults based on source_type

# BigQuery destination
bigquery:
  project_id: my-gcp-project
  dataset_id: migrated_teradata_data
  location: US  # or EU, asia-northeast1, etc.
  create_dataset: true

# Migration settings
tables: null  # null = migrate ALL tables, or list specific tables:
# tables:
#   - CUSTOMER
#   - ORDERS
#   - PRODUCTS

exclude_tables:  # Tables to skip
  - TEMP_TABLE
  - BACKUP_OLD
  - TEST_TABLE

parallel_transfers: 50  # Number of tables to migrate simultaneously
dry_run: false  # Set to true to see what would be migrated without actually doing it
incremental_mode: false  # true = append data, false = replace
schedule: null  # null = one-time, or "every day 00:00" for recurring

---

# Oracle Example
source:
  source_type: oracle
  host: oracle.company.com
  port: 1521
  database: ORCL
  user: ${ORACLE_USER}
  password: ${ORACLE_PASSWORD}

bigquery:
  project_id: my-gcp-project
  dataset_id: oracle_migration
  location: US

parallel_transfers: 30
dry_run: false

---

# MySQL Example (for Datastream CDC)
source:
  source_type: mysql
  host: mysql.company.com
  port: 3306
  database: production
  user: ${MYSQL_USER}
  password: ${MYSQL_PASSWORD}

bigquery:
  project_id: my-gcp-project
  dataset_id: mysql_replicated
  location: US

# Real-time replication - data continuously synced
incremental_mode: true
schedule: null  # Datastream handles continuous replication

