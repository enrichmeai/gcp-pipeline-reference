name: 'application2_transformations'
version: '1.0.0'
config-version: 2

profile: 'application2_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros", "../libs/gcp_pipeline_transform/dbt_shared/macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Documentation
docs-paths: ["docs"]

models:
  application2_transformations:
    staging:
      +materialized: view
      +schema: stg_loa
      +tags: ["staging", "application2"]
    fdp:
      +materialized: incremental
      +schema: fdp_loa
      +tags: ["fdp", "application2"]

vars:
  # GCP project
  gcp_project_id: "{{ env_var('GCP_PROJECT_ID') }}"

  # Application2-specific datasets
  source_dataset: "odp_loa"
  staging_dataset: "stg_loa"
  fdp_dataset: "fdp_loa"

  # Extract date filter (optional)
  extract_date: null

# Quoting
quoting:
  database: false
  schema: false
  identifier: false

# Tests
on-run-start: []
on-run-end: []

# Snapshots
snapshots:
  +strategy: timestamp
  +updated_at: _processed_at

