version: 2

models:
  - name: em_attributes
    description: |
      EM Attributes - Foundation Data Product
      
      JOIN of 3 ODP sources (customers, accounts, decision) into a single
      denormalized table for downstream analytics.
      
      Dependency: ALL 3 entities must be loaded before this runs.

    config:
      tags: ["fdp", "em", "join"]
      materialized: incremental
      unique_key: attribute_key
      partition_by:
        field: _extract_date
        data_type: date
      cluster_by:
        - customer_id
        - account_id

    columns:
      - name: attribute_key
        description: "Composite key (customer_id-account_id-decision_id)"
        tests:
          - not_null
          - unique

      # Customer columns
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: ssn_masked
        description: "Masked SSN (***-**-XXXX)"
      - name: first_name
        description: "Customer first name"
      - name: last_name
        description: "Customer last name"
      - name: date_of_birth
        description: "Customer date of birth"
      - name: customer_status
        description: "Customer status (Active/Inactive/Closed)"

      # Account columns
      - name: account_id
        description: "Account identifier"
      - name: account_type_desc
        description: "Account type description"
      - name: current_balance
        description: "Current account balance"
      - name: account_open_date
        description: "Account open date"

      # Decision columns
      - name: decision_id
        description: "Decision identifier"
      - name: decision_outcome
        description: "Decision outcome (Approved/Declined/Under Review/Pending)"
      - name: decision_date
        description: "Date of decision"
      - name: decision_reason
        description: "Decision reason codes"

      # Audit columns
      - name: _run_id
        description: "Pipeline run ID"
        tests:
          - not_null
      - name: _extract_date
        description: "Extract date from source"
        tests:
          - not_null
      - name: _transformed_at
        description: "Transformation timestamp"

