pipeline:
  name: LOA Pipeline Deployment
  identifier: loa_pipeline_deployment
  projectIdentifier: legacy_migration_reference
  orgIdentifier: default
  tags:
    service: loa-pipeline
    migration: mainframe-to-gcp
    type: apache-beam
    pattern: split

  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: legacy-migration-reference
        build:
          type: branch
          spec:
            branch: main

  variables:
    - name: gcp_project_id
      type: String
      default: ""
      required: true
    - name: environment
      type: String
      default: "dev"
      required: true
    - name: region
      type: String
      default: "europe-west2"
    - name: composer_bucket
      type: String
      default: ""

  stages:
    # ==========================================================================
    # Stage 1: Build & Test
    # ==========================================================================
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # Install dependencies and run library tests
              - step:
                  type: Run
                  name: Test gcp-pipeline-builder
                  identifier: test_builder
                  spec:
                    connectorRef: docker_hub
                    image: python:3.11
                    shell: Bash
                    command: |
                      echo "=== Testing gcp-pipeline-builder ==="
                      cd libraries/gcp-pipeline-builder
                      pip install -e .[dev]
                      pytest tests/ -v --tb=short
                      echo "✅ gcp-pipeline-builder tests passed"

              # Run LOA deployment tests
              - step:
                  type: Run
                  name: Test LOA Deployment
                  identifier: test_loa
                  spec:
                    connectorRef: docker_hub
                    image: python:3.11
                    shell: Bash
                    command: |
                      echo "=== Testing LOA Deployment ==="
                      # Install libraries
                      pip install -e libraries/gcp-pipeline-builder
                      pip install -e libraries/gcp-pipeline-tester
                      # Install LOA deployment
                      cd deployments/loa
                      pip install -e .
                      # Run tests
                      PYTHONPATH=src:../../libraries/gcp-pipeline-builder/src:../../libraries/gcp-pipeline-tester/src \
                        pytest tests/unit -v --tb=short
                      echo "✅ LOA tests passed (55 tests)"

              # Build Docker image
              - step:
                  type: BuildAndPushGCR
                  name: Build LOA Pipeline Image
                  identifier: build_loa_image
                  spec:
                    connectorRef: gcp_connector
                    host: gcr.io
                    projectID: <+pipeline.variables.gcp_project_id>
                    imageName: loa-pipeline
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: deployments/loa/Dockerfile
                    context: .

    # ==========================================================================
    # Stage 2: Deploy Infrastructure (Terraform)
    # ==========================================================================
    - stage:
        name: Deploy Infrastructure
        identifier: deploy_infrastructure
        type: Deployment
        spec:
          deploymentType: CustomDeployment
          environment:
            environmentRef: <+pipeline.variables.environment>
            infrastructureDefinitions: []
          execution:
            steps:
              - step:
                  type: Run
                  name: Terraform Init and Apply
                  identifier: terraform_apply
                  spec:
                    connectorRef: gcp_connector
                    image: hashicorp/terraform:1.5
                    shell: Bash
                    command: |
                      echo "=== Deploying LOA Infrastructure ==="
                      cd infrastructure/terraform/loa
                      
                      # Initialize Terraform
                      terraform init
                      
                      # Plan
                      terraform plan \
                        -var="project_id=<+pipeline.variables.gcp_project_id>" \
                        -var="region=<+pipeline.variables.region>" \
                        -var="environment=<+pipeline.variables.environment>" \
                        -var-file="env/<+pipeline.variables.environment>.tfvars" \
                        -out=tfplan
                      
                      # Apply
                      terraform apply -auto-approve tfplan
                      
                      echo "✅ LOA Infrastructure deployed"

    # ==========================================================================
    # Stage 3: Deploy Dataflow Pipeline
    # ==========================================================================
    - stage:
        name: Deploy Dataflow
        identifier: deploy_dataflow
        type: Deployment
        spec:
          deploymentType: CustomDeployment
          environment:
            environmentRef: <+pipeline.variables.environment>
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy Dataflow Template
                  identifier: deploy_dataflow_template
                  spec:
                    connectorRef: gcp_connector
                    image: google/cloud-sdk:latest
                    shell: Bash
                    command: |
                      echo "=== Deploying LOA Dataflow Pipeline ==="
                      
                      PROJECT_ID="<+pipeline.variables.gcp_project_id>"
                      REGION="<+pipeline.variables.region>"
                      
                      # Build Flex Template
                      gcloud dataflow flex-template build \
                        gs://${PROJECT_ID}-dataflow-templates/loa/loa_pipeline.json \
                        --image-gcr-path gcr.io/${PROJECT_ID}/loa-pipeline:latest \
                        --sdk-language PYTHON \
                        --flex-template-base-image PYTHON3 \
                        --metadata-file deployments/loa/pipeline/metadata.json
                      
                      echo "✅ Dataflow template deployed"

    # ==========================================================================
    # Stage 4: Deploy dbt Models
    # ==========================================================================
    - stage:
        name: Deploy dbt Models
        identifier: deploy_dbt
        type: Deployment
        spec:
          deploymentType: CustomDeployment
          environment:
            environmentRef: <+pipeline.variables.environment>
          execution:
            steps:
              - step:
                  type: Run
                  name: Run dbt
                  identifier: run_dbt
                  spec:
                    connectorRef: gcp_connector
                    image: ghcr.io/dbt-labs/dbt-bigquery:1.5.0
                    shell: Bash
                    command: |
                      echo "=== Deploying LOA dbt Models ==="
                      cd deployments/loa/transformations/dbt
                      
                      # Install dependencies
                      dbt deps
                      
                      # Run models (SPLIT: 1 source -> 2 targets)
                      # - fdp_loa.event_transaction_excess
                      # - fdp_loa.portfolio_account_excess
                      dbt run --target <+pipeline.variables.environment>
                      
                      # Run tests
                      dbt test --target <+pipeline.variables.environment>
                      
                      echo "✅ dbt models deployed and tested"

    # ==========================================================================
    # Stage 5: Deploy Airflow DAGs
    # ==========================================================================
    - stage:
        name: Deploy Airflow DAGs
        identifier: deploy_airflow
        type: Deployment
        spec:
          deploymentType: CustomDeployment
          environment:
            environmentRef: <+pipeline.variables.environment>
          execution:
            steps:
              - step:
                  type: Run
                  name: Upload DAGs to Composer
                  identifier: upload_dags
                  spec:
                    connectorRef: gcp_connector
                    image: google/cloud-sdk:latest
                    shell: Bash
                    command: |
                      echo "=== Deploying LOA Airflow DAGs ==="
                      
                      COMPOSER_BUCKET="<+pipeline.variables.composer_bucket>"
                      
                      # Upload DAGs (LOA has immediate trigger - no entity dependency wait)
                      gsutil -m cp -r deployments/loa/src/loa/orchestration/airflow/dags/* \
                        gs://${COMPOSER_BUCKET}/dags/loa/
                      
                      echo "✅ Airflow DAGs deployed"

    # ==========================================================================
    # Stage 6: Validate Deployment
    # ==========================================================================
    - stage:
        name: Validate Deployment
        identifier: validate
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Validate LOA Deployment
                  identifier: validate_loa
                  spec:
                    connectorRef: gcp_connector
                    image: google/cloud-sdk:latest
                    shell: Bash
                    command: |
                      echo "=== Validating LOA Deployment ==="
                      
                      PROJECT_ID="<+pipeline.variables.gcp_project_id>"
                      
                      # Check BigQuery datasets exist
                      # LOA: 1 ODP table, 2 FDP tables
                      bq ls --project_id=${PROJECT_ID} | grep -E "odp_loa|fdp_loa|job_control"
                      
                      # Check GCS buckets exist
                      gsutil ls gs://${PROJECT_ID}-loa-landing
                      gsutil ls gs://${PROJECT_ID}-loa-archive
                      
                      # Check Pub/Sub topics exist
                      gcloud pubsub topics list --project=${PROJECT_ID} | grep loa-notifications
                      
                      echo "✅ LOA Deployment validated successfully"

