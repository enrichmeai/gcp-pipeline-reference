name: 'bigquery_mapped_product'
version: '1.0.0'
config-version: 2

profile: 'mapped_product_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros", "shared_macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Documentation
docs-paths: ["docs"]

models:
  bigquery_mapped_product:
    staging:
      +materialized: ephemeral
      +tags: ["staging"]
    fdp:
      +materialized: incremental
      +schema: fdp
      +tags: ["fdp"]

vars:
  # GCP project
  gcp_project_id: "{{ env_var('GCP_PROJECT_ID') }}"

  # PII masking: NONE for dev/int, PARTIAL for staging, FULL for prod
  masking_level: "NONE"

  # Consolidated datasets
  source_dataset: "odp_generic"
  staging_dataset: "stg_generic"
  fdp_dataset: "fdp_generic"

  # Date parameters
  extract_date: null
  current_date: "CURRENT_DATE()"

  # Consolidated entities
  all_entities: ['customers', 'accounts', 'decision', 'applications']
