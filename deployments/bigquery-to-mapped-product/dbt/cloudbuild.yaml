steps:
- name: 'gcr.io/$PROJECT_ID/generic-transformation:latest'
  dir: '/app/deployments/bigquery-to-mapped-product/dbt'
  env:
  - 'GCP_PROJECT_ID=$_PROJECT_ID'
  - 'RUN_ID=$BUILD_ID'
  args: ['run', '--target', 'prod', '--profiles-dir', '.']

- name: 'gcr.io/$PROJECT_ID/generic-transformation:latest'
  dir: '/app/deployments/bigquery-to-mapped-product/dbt'
  env:
  - 'GCP_PROJECT_ID=$_PROJECT_ID'
  - 'RUN_ID=$BUILD_ID'
  args: ['test', '--target', 'prod', '--profiles-dir', '.']

options:
  logging: CLOUD_LOGGING_ONLY
