unit_tests:
  - name: test_portfolio_account_facility_logic
    description: "Verify that the facility_key is correctly mapped from application_id"
    model: portfolio_account_facility
    given:
      - input: ref('stg_generic_applications')
        rows:
          - {application_id: 'APP1', customer_id: 'C1', loan_amount: 1000, interest_rate: 5.5, term_months: 12, application_date: '2023-01-01', application_status: 'APPROVED', branch_code: 'B1', product_type: 'PERSONAL', _run_id: 'R1', _extract_date: '2023-01-01'}
    expect:
      rows:
        - {facility_key: 'APP1', application_id: 'APP1', customer_id: 'C1'}
