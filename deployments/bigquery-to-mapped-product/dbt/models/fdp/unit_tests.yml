unit_tests:
  - name: test_portfolio_account_facility_logic
    description: "Verify application attributes are correctly mapped"
    model: portfolio_account_facility
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_generic_applications')
        rows:
          - {application_id: 'APP1', customer_id: 'C1', loan_amount: 1000, interest_rate: 5.5, term_months: 12, application_date: '2023-01-01', application_status: 'APPROVED', event_type: 'NEW', account_type: 'PERSONAL', _run_id: 'R1', _extract_date: '2023-01-01'}
    expect:
      rows:
        - {application_id: 'APP1', customer_id: 'C1', loan_amount: 1000}
