steps:
- name: 'gcr.io/$PROJECT_ID/generic-cdp-transformation:latest'
  env:
  - 'GCP_PROJECT_ID=$_PROJECT_ID'
  - 'RUN_ID=$BUILD_ID'
  args: ['run', '--target', 'prod', '--profiles-dir', '/app/deployments/fdp-to-consumable-product/dbt']

- name: 'gcr.io/$PROJECT_ID/generic-cdp-transformation:latest'
  env:
  - 'GCP_PROJECT_ID=$_PROJECT_ID'
  - 'RUN_ID=$BUILD_ID'
  args: ['test', '--target', 'prod', '--profiles-dir', '/app/deployments/fdp-to-consumable-product/dbt']

options:
  logging: CLOUD_LOGGING_ONLY
