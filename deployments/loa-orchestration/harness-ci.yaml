pipeline:
  name: loa-orchestration CI/CD
  identifier: loa_orchestration_cicd
  projectIdentifier: legacy_migration_reference
  orgIdentifier: default
  tags:
    service: loa-orchestration
    type: airflow

  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: loa-orchestration
        build:
          type: branch
          spec:
            branch: main

  triggers:
    - trigger:
        name: On LOA Orchestration Change
        identifier: on_loa_orchestration_change
        type: Webhook
        spec:
          type: Github
          spec:
            type: Push
            spec:
              connectorRef: github_connector
              autoAbortPreviousExecutions: true
              filter:
                branch:
                  include:
                    - main
                paths:
                  include:
                    - deployments/loa-orchestration/**

  variables:
    - name: gcp_project_id
      type: String
      default: ""
    - name: environment
      type: String
      default: "dev"
    - name: composer_bucket
      type: String
      default: ""

  stages:
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run DAG Tests
                  identifier: run_tests
                  spec:
                    connectorRef: docker_hub
                    image: python:3.11
                    shell: Bash
                    command: |
                      pip install apache-airflow gcp-pipeline-core gcp-pipeline-orchestration
                      pytest tests/ -v --tb=short

    - stage:
        name: Deploy Infrastructure
        identifier: deploy_infra
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Terraform Apply
                  identifier: tf_apply
                  spec:
                    connectorRef: docker_hub
                    image: hashicorp/terraform:latest
                    shell: Bash
                    command: |
                      cd infrastructure/terraform/systems/loa/orchestration
                      terraform init
                      terraform apply -auto-approve -var="project_id=<+pipeline.variables.gcp_project_id>"

    - stage:
        name: Deploy DAGs
        identifier: deploy_dags
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Upload to Composer
                  identifier: upload_dags
                  spec:
                    connectorRef: gcp_connector
                    image: google/cloud-sdk:latest
                    shell: Bash
                    command: |
                      gsutil -m cp -r dags/* gs://<+pipeline.variables.composer_bucket>/dags/loa/
