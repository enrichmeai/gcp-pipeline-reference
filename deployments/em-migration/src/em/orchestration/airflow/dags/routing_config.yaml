# Routing configuration for EM (Excess Management) Pipeline
# Version: 1.0.0
# Last Updated: 2026-01-04

# Default settings for all pipelines
default_settings:
  default_pipeline: em_odp_load_dag
  default_processing_mode: batch
  dlq_topic: em-notifications-dead-letter
  quarantine_bucket: em-error
  max_retries: 3
  retry_delay_seconds: 300

# Entity-specific routing rules
# EM has 3 entities: customers, accounts, decision
# All 3 must be loaded before FDP transformation (JOIN)
routing_rules:
  # Customers Pipeline
  - pipeline_id: em_customers_pipeline
    entity_type: customers
    file_patterns:
      - "*/customers_*"
      - "*/em_customers_*"
      - "*/CUSTOMERS_*"
    target_table: odp_em.customers
    error_table: odp_em.customers_errors
    processing_mode: batch
    dataflow_template: gs://em-templates/dataflow/em_pipeline_template
    validation:
      required_columns:
        - customer_id
        - first_name
        - last_name
        - ssn
        - dob
        - status
        - created_date
      rules:
        ssn_format: "^\\d{3}-\\d{2}-\\d{4}$"
      sample_size: 5

  # Accounts Pipeline
  - pipeline_id: em_accounts_pipeline
    entity_type: accounts
    file_patterns:
      - "*/accounts_*"
      - "*/em_accounts_*"
      - "*/ACCOUNTS_*"
    target_table: odp_em.accounts
    error_table: odp_em.accounts_errors
    processing_mode: batch
    dataflow_template: gs://em-templates/dataflow/em_pipeline_template
    validation:
      required_columns:
        - account_id
        - customer_id
        - account_type
        - balance
        - status
        - opened_date
      rules:
        balance_range: [0, 10000000]
        account_types:
          - CHECKING
          - SAVINGS
          - MONEY_MARKET
      sample_size: 5

  # Decision Pipeline
  - pipeline_id: em_decision_pipeline
    entity_type: decision
    file_patterns:
      - "*/decision_*"
      - "*/em_decision_*"
      - "*/DECISION_*"
    target_table: odp_em.decision
    error_table: odp_em.decision_errors
    processing_mode: batch
    dataflow_template: gs://em-templates/dataflow/em_pipeline_template
    validation:
      required_columns:
        - decision_id
        - customer_id
        - account_id
        - decision_type
        - decision_date
        - score
      rules:
        score_range: [0, 1000]
        decision_types:
          - APPROVE
          - DECLINE
          - REVIEW
      sample_size: 5

# Entity dependency configuration
# EM requires all 3 entities before FDP transformation
entity_dependencies:
  system_id: EM
  required_entities:
    - customers
    - accounts
    - decision
  fdp_trigger_dag: em_fdp_transform_dag
  fdp_target_table: fdp_em.em_attributes

# Error handling configuration
error_handling:
  validation_failure:
    action: quarantine
    notify: true
    dlq_publish: true
    dlq_topic: em-notifications-dead-letter
  routing_failure:
    action: log_and_skip
    notify: true
    dlq_publish: true
  processing_failure:
    action: retry
    max_retries: 3
    retry_delay_seconds: 300
    notify: true
    dlq_publish: true
  schema_mismatch:
    action: quarantine
    notify: true
    dlq_publish: true

# Monitoring and alerting configuration
monitoring:
  enable_metrics: true
  metrics_namespace: em/pipeline
  alert_on_failure: true
  alert_channels:
    - email

