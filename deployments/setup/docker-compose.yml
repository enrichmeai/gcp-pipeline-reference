version: '3.8'

# LOA Blueprint Local Testing Environment
# Includes: Airflow, PostgreSQL, Redis, GCP Emulators, Pytest, Jupyter
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f            # View logs
#   docker-compose down               # Stop all services
#
# Services:
#   airflow-db         Port 5432:5432 (PostgreSQL - Airflow metadata)
#   airflow-webserver  Port 8080:8080 (Airflow UI)
#   airflow-scheduler  No port (Airflow scheduler - background)
#   test-runner        No port (Pytest - runs on demand)
#   redis              Port 6379:6379 (Redis cache)
#   bigquery-emulator  Port 9050/9060 (BigQuery emulation)
#   pubsub-emulator    Port 8085:8085 (Pub/Sub emulation)
#   jupyter            Port 8888:8888 (JupyterLab - optional)

services:
  # =========================================================================
  # Database Layer
  # =========================================================================

  # Airflow PostgreSQL Database
  airflow-db:
    image: postgres:15-alpine
    container_name: loa-airflow-db
    hostname: airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    ports:
      - "${AIRFLOW_DB_PORT:-5432}:5432"
    networks:
      - loa-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.loa-blueprint.description=Airflow metadata database"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: loa-redis
    hostname: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - loa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes
    labels:
      - "com.loa-blueprint.description=Redis cache for celery and caching"

  # =========================================================================
  # Airflow Services
  # =========================================================================

  # Airflow Webserver
  airflow-webserver:
    build:
      context: ..
      dockerfile: setup/Dockerfile.airflow
    image: loa-blueprint-airflow:latest
    container_name: loa-airflow-webserver
    hostname: airflow-webserver
    environment:
      # Core Airflow settings
      AIRFLOW_HOME: /home/appuser/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/blueprint/components/orchestration/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__EXECUTOR: LocalExecutor

      # Webserver settings
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__WEBSERVER__DEFAULT_VIEW: "tree"

      # Security settings
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-local-dev-key-change-in-prod}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-local-dev-fernet-change-in-prod}

      # Python environment
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # GCP settings (for local testing)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-loa-test-project}
      GOOGLE_APPLICATION_CREDENTIALS: /home/appuser/.config/gcloud/application_default_credentials.json

      # Additional settings
      AIRFLOW__CORE__PLUGINS_FOLDER: /app/blueprint/components/orchestration/airflow/plugins
      AIRFLOW__LOGGING__LOGGING_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      - ./blueprint:/app/blueprint:ro
      - ./components:/app/components:ro
      - airflow_logs:/home/appuser/airflow/logs
      - airflow_plugins:/home/appuser/airflow/plugins
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro

    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"

    networks:
      - loa-network

    depends_on:
      airflow-db:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true &&
      airflow webserver --port 8080
      "

    labels:
      - "com.loa-blueprint.description=Airflow webserver UI"

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: ..
      dockerfile: setup/Dockerfile.airflow
    image: loa-blueprint-airflow:latest
    container_name: loa-airflow-scheduler
    hostname: airflow-scheduler
    environment:
      # Core Airflow settings (same as webserver)
      AIRFLOW_HOME: /home/appuser/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/blueprint/components/orchestration/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__EXECUTOR: LocalExecutor

      # Security settings
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-local-dev-key-change-in-prod}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-local-dev-fernet-change-in-prod}

      # Python environment
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # GCP settings
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-loa-test-project}
      GOOGLE_APPLICATION_CREDENTIALS: /home/appuser/.config/gcloud/application_default_credentials.json

      # Additional settings
      AIRFLOW__CORE__PLUGINS_FOLDER: /app/blueprint/components/orchestration/airflow/plugins
      AIRFLOW__LOGGING__LOGGING_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      - ./blueprint:/app/blueprint:ro
      - ./components:/app/components:ro
      - airflow_logs:/home/appuser/airflow/logs
      - airflow_plugins:/home/appuser/airflow/plugins
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro

    networks:
      - loa-network

    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "pgrep", "-f", "airflow scheduler"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    command: airflow scheduler --daemon

    labels:
      - "com.loa-blueprint.description=Airflow scheduler (background)"

  # =========================================================================
  # Testing Services
  # =========================================================================

  # Pytest Test Runner
  test-runner:
    build:
      context: ..
      dockerfile: setup/Dockerfile.test
    image: loa-blueprint-test:latest
    container_name: loa-test-runner
    working_dir: /app/blueprint
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTEST_ARGS: ${PYTEST_ARGS:--v --cov=components/loa_common --cov-report=html}

      # GCP settings
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-loa-test-project}
      GOOGLE_APPLICATION_CREDENTIALS: /app/.config/gcloud/application_default_credentials.json

      # Database connection for integration tests
      TEST_DB_URL: postgresql://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}

    volumes:
      - ./blueprint:/app/blueprint
      - ./components:/app/components
      - test_reports:/app/blueprint/test_reports
      - test_htmlcov:/app/blueprint/htmlcov
      - ~/.config/gcloud:/app/.config/gcloud:ro

    networks:
      - loa-network

    depends_on:
      airflow-db:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: >
      bash -c "
      echo '====== Running Pytest ======' &&
      pytest components/tests/ ${PYTEST_ARGS} &&
      echo '====== Tests Complete ======'
      "

    labels:
      - "com.loa-blueprint.description=Pytest test runner"

  # =========================================================================
  # GCP Emulators
  # =========================================================================

  # BigQuery Emulator (for local testing)
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    container_name: loa-bigquery-emulator
    hostname: bigquery-emulator
    environment:
      GRPC_PORT: 9050
      REST_PORT: 9060
    ports:
      - "${BIGQUERY_EMULATOR_GRPC_PORT:-9050}:9050"
      - "${BIGQUERY_EMULATOR_REST_PORT:-9060}:9060"
    networks:
      - loa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9060/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.loa-blueprint.description=BigQuery emulator for local testing"

  # Pub/Sub Emulator (for local testing)
  pubsub-emulator:
    image: google/cloud-sdk:emulators
    container_name: loa-pubsub-emulator
    hostname: pubsub-emulator
    entrypoint: "gcloud beta emulators pubsub start --host-port=0.0.0.0:8085"
    ports:
      - "${PUBSUB_EMULATOR_PORT:-8085}:8085"
    networks:
      - loa-network
    environment:
      PUBSUB_EMULATOR_HOST: 0.0.0.0:8085
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/v1/projects/test-project"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.loa-blueprint.description=Pub/Sub emulator for local testing"

  # =========================================================================
  # Development Services (Optional)
  # =========================================================================

  # Jupyter Lab (for interactive development)
  jupyter:
    image: python:3.11-slim
    container_name: loa-jupyter
    hostname: jupyter
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      - ./blueprint:/app/blueprint
      - ./components:/app/components
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - jupyter_data:/root/.jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    networks:
      - loa-network
    command: >
      bash -c "
      pip install -q jupyter jupyterlab &&
      jupyter lab --ip=0.0.0.0 --allow-root --no-browser --NotebookApp.token='' --NotebookApp.password=''
      "
    labels:
      - "com.loa-blueprint.description=JupyterLab for interactive development"

  # LOA Application Container (for manual testing)
  loa-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loa-blueprint-app
    hostname: loa-app
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-loa-test-project}
      GOOGLE_APPLICATION_CREDENTIALS: /app/.config/gcloud/application_default_credentials.json
    volumes:
      - ./blueprint:/app/blueprint
      - ./components:/app/components
      - ~/.config/gcloud:/app/.config/gcloud:ro
    ports:
      - "${LOA_APP_PORT:-8000}:8000"
    networks:
      - loa-network
    depends_on:
      airflow-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "python -m pytest components/tests/ -v --tb=short"
    labels:
      - "com.loa-blueprint.description=LOA application container"

# ============================================================================
# Volumes
# ============================================================================

volumes:
  # Database
  airflow_db_data:
    driver: local
    labels:
      - "com.loa-blueprint.description=Airflow PostgreSQL data"

  # Cache
  redis_data:
    driver: local
    labels:
      - "com.loa-blueprint.description=Redis cache data"

  # Airflow
  airflow_logs:
    driver: local
    labels:
      - "com.loa-blueprint.description=Airflow scheduler and task logs"

  airflow_plugins:
    driver: local
    labels:
      - "com.loa-blueprint.description=Airflow plugins directory"

  # Testing
  test_reports:
    driver: local
    labels:
      - "com.loa-blueprint.description=Test reports and coverage"

  test_htmlcov:
    driver: local
    labels:
      - "com.loa-blueprint.description=HTML coverage reports"

  # Development
  jupyter_data:
    driver: local
    labels:
      - "com.loa-blueprint.description=JupyterLab configuration"

# ============================================================================
# Networks
# ============================================================================

networks:
  loa-network:
    driver: bridge
    labels:
      - "com.loa-blueprint.description=LOA Blueprint local testing network"

