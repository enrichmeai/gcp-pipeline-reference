pipeline:
  name: loa-transformation CI/CD
  identifier: loa_transformation_cicd
  projectIdentifier: legacy_migration_reference
  orgIdentifier: default
  tags:
    service: loa-transformation
    type: dbt

  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: loa-transformation
        build:
          type: branch
          spec:
            branch: main

  triggers:
    - trigger:
        name: On LOA Transformation Change
        identifier: on_loa_transformation_change
        type: Webhook
        spec:
          type: Github
          spec:
            type: Push
            spec:
              connectorRef: github_connector
              autoAbortPreviousExecutions: true
              filter:
                branch:
                  include:
                    - main
                paths:
                  include:
                    - deployments/loa-transformation/**

  variables:
    - name: gcp_project_id
      type: String
      default: ""
    - name: environment
      type: String
      default: "dev"

  stages:
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run dbt Tests
                  identifier: run_tests
                  spec:
                    connectorRef: docker_hub
                    image: ghcr.io/dbt-labs/dbt-bigquery:latest
                    shell: Bash
                    command: |
                      cd dbt
                      dbt deps
                      dbt test --target <+pipeline.variables.environment>

    - stage:
        name: Deploy Infrastructure
        identifier: deploy_infra
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Terraform Apply
                  identifier: tf_apply
                  spec:
                    connectorRef: docker_hub
                    image: hashicorp/terraform:latest
                    shell: Bash
                    command: |
                      cd infrastructure/terraform/systems/loa/transformation
                      terraform init
                      terraform apply -auto-approve -var="project_id=<+pipeline.variables.gcp_project_id>"

    - stage:
        name: Deploy Models
        identifier: deploy_models
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Run dbt
                  identifier: run_dbt
                  spec:
                    connectorRef: docker_hub
                    image: ghcr.io/dbt-labs/dbt-bigquery:latest
                    shell: Bash
                    command: |
                      cd dbt
                      dbt deps
                      dbt run --target <+pipeline.variables.environment>
