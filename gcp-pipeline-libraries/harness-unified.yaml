pipeline:
  name: GCP Pipeline Libraries Unified CI
  identifier: gcp_pipeline_libraries_unified_ci
  projectIdentifier: default_project
  orgIdentifier: default_org
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: YOUR_GIT_CONNECTOR_ID # Change this to your Harness Git Connector ID
        repoName: legacy-migration-reference
        build: <+input>
  stages:
    - stage:
        name: Core Library
        identifier: core_library
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR_ID # Change this to your K8S Connector ID
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Build and Test Core
                  identifier: build_test_core
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR_ID # Change this to your Docker Connector ID
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-core
                      pip install -e .[dev]
                      pytest tests/unit

    - stage:
        name: Beam Library
        identifier: beam_library
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR_ID
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Build and Test Beam
                  identifier: build_test_beam
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR_ID
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-beam
                      pip install -e .[dev]
                      pytest tests/unit

    - stage:
        name: Orchestration Library
        identifier: orchestration_library
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR_ID
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Build and Test Orchestration
                  identifier: build_test_orchestration
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR_ID
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-orchestration
                      pip install -e .[dev]
                      pytest tests/unit

    - stage:
        name: Transform Library
        identifier: transform_library
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR_ID
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Build and Test Transform
                  identifier: build_test_transform
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR_ID
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-transform
                      pip install -e .[dev]
                      pytest tests/unit

    - stage:
        name: Tester Library
        identifier: tester_library
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR_ID
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Build and Test Tester
                  identifier: build_test_tester
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR_ID
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-tester
                      pip install -e .[dev]
                      pytest tests/unit



