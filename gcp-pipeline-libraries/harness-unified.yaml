pipeline:
  name: GCP Pipeline Libraries Unified CI
  identifier: gcp_pipeline_libraries_unified_ci
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  properties:
    ci:
      codebase:
        connectorRef: <+input>
        repoName: <+input>
        build:
          type: branch
          spec:
            branch: <+input>
  stages:
    - stage:
        name: Unified Libraries Build
        identifier: unified_libraries_build
        type: CI
        spec:
          cloneCodebase: true
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Core Library
                  identifier: build_test_core
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-core
                      pip install -e .[dev]
                      pytest tests/unit

              - step:
                  name: Beam Library
                  identifier: build_test_beam
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-beam
                      pip install -e .[dev]
                      pytest tests/unit

              - step:
                  name: Orchestration Library
                  identifier: build_test_orchestration
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-orchestration
                      pip install -e .[dev]
                      pytest tests/unit

              - step:
                  name: Transform Library
                  identifier: build_test_transform
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-transform
                      pip install -e .[dev]
                      pytest tests/unit

              - step:
                  name: Tester Library
                  identifier: build_test_tester
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      cd gcp-pipeline-libraries/gcp-pipeline-tester
                      pip install -e .[dev]
                      pytest tests/unit

    - stage:
        name: Publish to Nexus
        identifier: publish_nexus
        type: CI
        spec:
          cloneCodebase: true
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Publish Libraries
                  identifier: publish_libraries
                  type: Run
                  spec:
                    connectorRef: docker_hub
                    image: python:3.9-slim
                    shell: Sh
                    command: |-
                      echo "enable nexus"
                      # To enable publishing, uncomment the lines below
                      # pip install twine build
                      
                      # Publish Core
