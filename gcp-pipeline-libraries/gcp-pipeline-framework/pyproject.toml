n
[project.urls]
Homepage = "https://github.com/enrichmeai/gcp-pipeline-reference"
Repository = "https://github.com/enrichmeai/gcp-pipeline-reference"
Documentation = "https://github.com/enrichmeai/gcp-pipeline-reference/tree/main/gcp-pipeline-libraries"
"Reference Implementations" = "https://github.com/enrichmeai/gcp-pipeline-reference/tree/main/deployments"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"gcp_pipeline_framework" = [
    "docs/*.md",
    "infrastructure/**/*.tf",
    "infrastructure/**/*.tfvars",
    "infrastructure/**/*.hcl",
    "infrastructure/**/*.yaml",
    "infrastructure/**/Dockerfile",
    "infrastructure/**/*.md",
    "workflows/*.yml",
    "config/*",
    "deployments/*/Dockerfile",
    "deployments/*/cloudbuild.yaml",
    "deployments/*/README.md",
    "deployments/*/pyproject.toml",
]
