[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gcp-pipeline-framework"
version = "1.0.9"
description = "Umbrella package for GCP Data Migration Pipeline Libraries"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gcp-pipeline-core==1.0.9",
    "gcp-pipeline-beam==1.0.9",
    "gcp-pipeline-orchestration==1.0.9",
    "gcp-pipeline-transform==1.0.9",
    "gcp-pipeline-tester==1.0.9",
]

[project.optional-dependencies]
core = ["gcp-pipeline-core==1.0.9"]
beam = ["gcp-pipeline-beam==1.0.9"]
orchestration = ["gcp-pipeline-orchestration==1.0.9"]
transform = ["gcp-pipeline-transform==1.0.9"]
tester = ["gcp-pipeline-tester==1.0.9"]

[tool.setuptools.packages.find]
where = ["src"]
