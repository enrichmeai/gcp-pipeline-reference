[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gcp-pipeline-framework"
version = "1.0.10"
description = "Umbrella package for GCP Data Migration Pipeline Libraries"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gcp-pipeline-core==1.0.10",
    "gcp-pipeline-beam==1.0.10",
    "gcp-pipeline-orchestration==1.0.10",
    "gcp-pipeline-transform==1.0.10",
    "gcp-pipeline-tester==1.0.10",
]

[project.optional-dependencies]
core = ["gcp-pipeline-core==1.0.10"]
beam = ["gcp-pipeline-beam==1.0.10"]
orchestration = ["gcp-pipeline-orchestration==1.0.10"]
transform = ["gcp-pipeline-transform==1.0.10"]
tester = ["gcp-pipeline-tester==1.0.10"]

[project.urls]
Homepage = "https://github.com/enrichmeai/gcp-pipeline-reference"
Repository = "https://github.com/enrichmeai/gcp-pipeline-reference"
Documentation = "https://github.com/enrichmeai/gcp-pipeline-reference/tree/main/gcp-pipeline-libraries"
"Reference Implementations" = "https://github.com/enrichmeai/gcp-pipeline-reference/tree/main/deployments"

[tool.setuptools.packages.find]
where = ["src"]
