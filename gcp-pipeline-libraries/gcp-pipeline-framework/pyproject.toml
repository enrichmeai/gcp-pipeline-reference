[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gcp-pipeline-framework"
version = "1.0.1"
description = "Umbrella package for GCP Data Migration Pipeline Libraries"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gcp-pipeline-core==1.0.1",
    "gcp-pipeline-beam==1.0.1",
    "gcp-pipeline-orchestration==1.0.1",
    "gcp-pipeline-transform==1.0.1",
    "gcp-pipeline-tester==1.0.1",
]

[project.optional-dependencies]
core = ["gcp-pipeline-core==1.0.1"]
beam = ["gcp-pipeline-beam==1.0.1"]
orchestration = ["gcp-pipeline-orchestration==1.0.1"]
transform = ["gcp-pipeline-transform==1.0.1"]
tester = ["gcp-pipeline-tester==1.0.1"]

[tool.setuptools.packages.find]
where = ["src"]
