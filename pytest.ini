[pytest]
# Pytest Configuration for LOA Blueprint
# Tests directory configuration
testpaths = components/tests/unit components/tests/integration components/tests/dag

# Python file patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    chaos: Chaos engineering tests
    slow: Slow running tests
    requires_gcp: Tests requiring GCP resources
    requires_airflow: Tests requiring Apache Airflow
    data_quality: Data quality validation tests

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstractproperty

