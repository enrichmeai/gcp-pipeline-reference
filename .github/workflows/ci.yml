name: CI Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd blueprint/components
          pip install -r requirements.txt
          pip install black flake8 pylint

      - name: Run Black
        run: |
          cd blueprint/components
          black --check loa_common/ loa_pipelines/ || true

      - name: Run Flake8
        run: |
          cd blueprint/components
          flake8 loa_common/ loa_pipelines/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Pylint
        run: |
          cd blueprint/components
          pylint loa_common/ loa_pipelines/ --exit-zero

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd blueprint/components
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          cd blueprint/components
          pytest tests/ -v --cov=loa_common/ --cov=loa_pipelines/ --cov-report=xml --cov-report=html
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Bandit Security Scan
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r blueprint/components/loa_common/ blueprint/components/loa_pipelines/ -f json -o bandit-report.json || true
          bandit -r blueprint/components/loa_common/ blueprint/components/loa_pipelines/
        continue-on-error: true

      - name: Dependency Check
        run: |
          pip install safety
          safety check --file blueprint/components/requirements.txt
        continue-on-error: true

  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format
        run: terraform fmt -check -recursive blueprint/infrastructure/terraform/
        continue-on-error: true

      - name: Terraform Init
        run: terraform -chdir=blueprint/infrastructure/terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=blueprint/infrastructure/terraform validate
