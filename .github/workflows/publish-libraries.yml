name: Publish Libraries to PyPI

# =============================================================================
# Trigger Modes:
#   1. Tags: v* tags automatically publish to PyPI
#   2. Commit Keywords:
#      - [publish] or [publish:lib] - Publish libraries only (TestPyPI)
#      - [publish:pypi] - Publish libraries to Production PyPI
#      NOTE: [publish:deploy] removed — publish and deploy are separate steps.
#      Publish first, verify on PyPI, then deploy via separate commit.
#   3. Manual: workflow_dispatch with options
#   4. Release: GitHub release published
#
# Security Notes:
#   - Requires PYPI_API_TOKEN and TEST_PYPI_API_TOKEN secrets
#   - Uses OIDC trusted publishing when available
#   - Artifacts are signed and verified
# =============================================================================

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: 'PyPI repository to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
        - pypi
        - testpypi
      deploy:
        description: 'Also trigger deployments after publishing'
        required: false
        default: false
        type: boolean
      libraries:
        description: 'Libraries to publish (comma-separated or "all")'
        required: false
        default: 'all'
        type: string
      dry_run:
        description: 'Dry run - build but do not upload'
        required: false
        default: false
        type: boolean

# Prevent concurrent publish runs to avoid version conflicts
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  # Library publish order (core must be first due to dependencies)
  CORE_LIBRARY: 'gcp-pipeline-core'
  DEPENDENT_LIBRARIES: 'gcp-pipeline-beam,gcp-pipeline-orchestration,gcp-pipeline-transform,gcp-pipeline-tester,gcp-pipeline-framework'

permissions:
  contents: write  # Needed for creating GitHub releases
  id-token: write  # For OIDC trusted publishing

jobs:
  # ==========================================================================
  # Gate: Determine if we should publish and what mode
  # ==========================================================================
  check-conditions:
    name: Check Publish Conditions
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      target_repo: ${{ steps.check.outputs.target_repo }}
      is_release: ${{ steps.check.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine publish conditions
        id: check
        run: |
          SHOULD_PUBLISH="false"
          SHOULD_DEPLOY="false"
          TARGET_REPO="testpypi"
          IS_RELEASE="false"
          
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          
          # Tag push (v*) - always publish to PyPI
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "📦 Tag push detected - publishing to PyPI"
            SHOULD_PUBLISH="true"
            TARGET_REPO="pypi"
            IS_RELEASE="true"
          fi
          
          # Release event
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "🎉 Release event - publishing to PyPI"
            SHOULD_PUBLISH="true"
            TARGET_REPO="pypi"
            IS_RELEASE="true"
          fi
          
          # Manual dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🔧 Manual dispatch"
            SHOULD_PUBLISH="true"
            TARGET_REPO="${{ inputs.repository }}"
            SHOULD_DEPLOY="${{ inputs.deploy }}"
          fi
          
          # Commit message keywords (only on main branch push, not tags)
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "Commit message: $COMMIT_MSG"
            
            # [publish:deploy] - treated same as [publish:pypi] (deploy is separate)
            if echo "$COMMIT_MSG" | grep -qiE '\[publish:deploy\]'; then
              echo "📦 [publish:deploy] keyword found — publishing to PyPI (deploy is a separate step)"
              SHOULD_PUBLISH="true"
              SHOULD_DEPLOY="false"
              TARGET_REPO="pypi"
            # [publish:pypi] - publish to production PyPI only
            elif echo "$COMMIT_MSG" | grep -qiE '\[publish:pypi\]'; then
              echo "📦 [publish:pypi] keyword found"
              SHOULD_PUBLISH="true"
              TARGET_REPO="pypi"
            # [publish] or [publish:lib] - publish to TestPyPI only
            elif echo "$COMMIT_MSG" | grep -qiE '\[publish(:lib)?\]'; then
              echo "📦 [publish] keyword found"
              SHOULD_PUBLISH="true"
              TARGET_REPO="testpypi"
            fi
          fi
          
          # Output results
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=========================================="
          echo "Summary:"
          echo "  Should publish: $SHOULD_PUBLISH"
          echo "  Should deploy:  $SHOULD_DEPLOY"
          echo "  Target repo:    $TARGET_REPO"
          echo "  Is release:     $IS_RELEASE"
          echo "=========================================="

  # ==========================================================================
  # Test Libraries - Validates all libraries before publishing
  # ==========================================================================
  test:
    name: Test Libraries
    runs-on: ubuntu-latest
    needs: check-conditions
    if: needs.check-conditions.outputs.should_publish == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false  # Continue testing other libraries if one fails
      matrix:
        library: [gcp-pipeline-core, gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester, gcp-pipeline-framework]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          gcp-pipeline-libraries/${{ matrix.library }}/pyproject.toml
          gcp-pipeline-libraries/gcp-pipeline-core/pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        
        # Install core first as others depend on it
        if [ "${{ matrix.library }}" != "gcp-pipeline-core" ]; then
          pip install ./gcp-pipeline-libraries/gcp-pipeline-core
        fi
        
        # For framework, we need to install all sub-libraries locally first
        if [ "${{ matrix.library }}" == "gcp-pipeline-framework" ]; then
          pip install ./gcp-pipeline-libraries/gcp-pipeline-beam
          pip install ./gcp-pipeline-libraries/gcp-pipeline-orchestration
          pip install ./gcp-pipeline-libraries/gcp-pipeline-transform
          pip install ./gcp-pipeline-libraries/gcp-pipeline-tester
        fi
        
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -f pyproject.toml ]; then
          pip install ".[dev]" || pip install .
        fi
        pip install pytest pytest-cov pytest-mock

    - name: Run Tests
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -d tests ]; then
          # For transform library, install dbt
          if [ "${{ matrix.library }}" == "gcp-pipeline-transform" ]; then
             pip install dbt-bigquery || true
          fi
          
          pytest tests/unit -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            || exit 1
        else
          echo "⚠️ No tests found for ${{ matrix.library }}"
        fi

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.library }}
        path: |
          gcp-pipeline-libraries/${{ matrix.library }}/test-results.xml
          gcp-pipeline-libraries/${{ matrix.library }}/coverage.xml
        retention-days: 7

  # ==========================================================================
  # Publish Core Library (must be first due to dependencies)
  # ==========================================================================
  publish-core:
    name: Publish Core Library
    needs: [check-conditions, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.check-conditions.outputs.target_repo == 'pypi' && 'production' || 'staging' }}

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version
      id: version
      run: |
        cd gcp-pipeline-libraries/gcp-pipeline-core
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Core library version: $VERSION"

    - name: Build package
      run: |
        cd gcp-pipeline-libraries/gcp-pipeline-core
        python -m build
        
        # Verify the build
        echo "📦 Built packages:"
        ls -la dist/
        
        # Validate package with twine
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-gcp-pipeline-core
        path: gcp-pipeline-libraries/gcp-pipeline-core/dist/
        retention-days: 30

    - name: Publish to PyPI
      if: ${{ inputs.dry_run != true }}
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ needs.check-conditions.outputs.target_repo == 'pypi' && secrets.PYPI_API_TOKEN || secrets.TEST_PYPI_API_TOKEN }}
      run: |
        cd gcp-pipeline-libraries/gcp-pipeline-core
        TARGET="${{ needs.check-conditions.outputs.target_repo }}"
        
        echo "📦 Publishing gcp-pipeline-core v${{ steps.version.outputs.version }} to $TARGET..."
        
        if [ "$TARGET" == "pypi" ]; then
          twine upload dist/* --skip-existing --non-interactive
        else
          twine upload --repository-url https://test.pypi.org/legacy/ dist/* --skip-existing --non-interactive
        fi
        
        echo "✅ Core library published to $TARGET"

    - name: Verify package availability
      if: ${{ inputs.dry_run != true }}
      run: |
        TARGET="${{ needs.check-conditions.outputs.target_repo }}"
        VERSION="${{ steps.version.outputs.version }}"
        
        # Wait for package to be available
        echo "⏳ Waiting for package to be indexed..."
        sleep 30
        
        # Verify the package is accessible
        if [ "$TARGET" == "pypi" ]; then
          pip index versions gcp-pipeline-core 2>/dev/null | grep -q "$VERSION" && echo "✅ Package verified on PyPI" || echo "⚠️ Package not yet indexed"
        else
          pip index versions gcp-pipeline-core --index-url https://test.pypi.org/simple/ 2>/dev/null | grep -q "$VERSION" && echo "✅ Package verified on TestPyPI" || echo "⚠️ Package not yet indexed"
        fi

  # ==========================================================================
  # Publish Dependent Libraries
  # ==========================================================================
  publish-others:
    name: Publish Dependent Libraries
    needs: [check-conditions, publish-core]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 2  # Avoid rate limiting
      matrix:
        library: [gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester, gcp-pipeline-framework]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version
      id: version
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 ${{ matrix.library }} version: $VERSION"

    - name: Sync bundled assets into framework package
      if: matrix.library == 'gcp-pipeline-framework'
      run: |
        FW="gcp-pipeline-libraries/gcp-pipeline-framework/src/gcp_pipeline_framework"

        echo "📄 Syncing docs..."
        rm -rf "$FW/docs" && mkdir -p "$FW/docs"
        cp docs/*.md "$FW/docs/"
        touch "$FW/docs/__init__.py"

        echo "🏗️ Syncing infrastructure..."
        rm -rf "$FW/infrastructure" && mkdir -p "$FW/infrastructure"
        cp -r infrastructure/terraform "$FW/infrastructure/"
        cp -r infrastructure/k8s "$FW/infrastructure/"
        cp infrastructure/README.md "$FW/infrastructure/" 2>/dev/null || true

        echo "⚙️ Syncing workflows..."
        rm -rf "$FW/workflows" && mkdir -p "$FW/workflows"
        cp .github/workflows/*.yml "$FW/workflows/"

        echo "📋 Syncing root config files..."
        rm -rf "$FW/config" && mkdir -p "$FW/config"
        for f in .gitignore .dockerignore .gcloudignore; do
          [ -f "$f" ] && cp "$f" "$FW/config/${f#.}"
        done
        for f in pyproject.toml qodana.yaml README.md PROJECT_CONTEXT.md; do
          [ -f "$f" ] && cp "$f" "$FW/config/"
        done
        [ -f .github/copilot-instructions.md ] && cp .github/copilot-instructions.md "$FW/config/"

        echo "🐳 Syncing deployment configs (Dockerfiles, cloudbuild)..."
        rm -rf "$FW/deployments"
        for d in original-data-to-bigqueryload data-pipeline-orchestrator bigquery-to-mapped-product fdp-to-consumable-product mainframe-segment-transform postgres-cdc-streaming spanner-to-bigquery-load; do
          if [ -d "deployments/$d" ]; then
            mkdir -p "$FW/deployments/$d"
            for f in Dockerfile cloudbuild.yaml README.md pyproject.toml; do
              [ -f "deployments/$d/$f" ] && cp "deployments/$d/$f" "$FW/deployments/$d/"
            done
          fi
        done

        echo "✅ All assets synced into framework package"
        find "$FW" -not -name '*.py' -not -name '__pycache__' -type f | wc -l | xargs -I{} echo "  {} non-Python files bundled"

    - name: Build package
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        python -m build

        echo "📦 Built packages:"
        ls -la dist/

        # Validate package
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.library }}
        path: gcp-pipeline-libraries/${{ matrix.library }}/dist/
        retention-days: 30

    - name: Publish to PyPI
      if: ${{ inputs.dry_run != true }}
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ needs.check-conditions.outputs.target_repo == 'pypi' && secrets.PYPI_API_TOKEN || secrets.TEST_PYPI_API_TOKEN }}
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        TARGET="${{ needs.check-conditions.outputs.target_repo }}"

        echo "📦 Publishing ${{ matrix.library }} v${{ steps.version.outputs.version }} to $TARGET..."

        if [ "$TARGET" == "pypi" ]; then
          twine upload dist/* --skip-existing --non-interactive
        else
          twine upload --repository-url https://test.pypi.org/legacy/ dist/* --skip-existing --non-interactive
        fi

        echo "✅ ${{ matrix.library }} published to $TARGET"

  # ==========================================================================
  # Publish Reference Implementations
  # ==========================================================================
  publish-references:
    name: Publish Reference Implementations
    needs: [check-conditions, publish-others]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        reference:
          - dir: original-data-to-bigqueryload
            name: gcp-pipeline-ref-ingestion
          - dir: bigquery-to-mapped-product
            name: gcp-pipeline-ref-transform
          - dir: data-pipeline-orchestrator
            name: gcp-pipeline-ref-orchestration
          - dir: fdp-to-consumable-product
            name: gcp-pipeline-ref-cdp
          - dir: mainframe-segment-transform
            name: gcp-pipeline-ref-segment-transform

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version
      id: version
      run: |
        cd deployments/${{ matrix.reference.dir }}
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 ${{ matrix.reference.name }} version: $VERSION"

    - name: Build package
      run: |
        cd deployments/${{ matrix.reference.dir }}
        python -m build
        
        echo "📦 Built packages:"
        ls -la dist/
        
        # Validate package
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.reference.name }}
        path: deployments/${{ matrix.reference.dir }}/dist/
        retention-days: 30

    - name: Publish to PyPI
      if: ${{ inputs.dry_run != true }}
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ needs.check-conditions.outputs.target_repo == 'pypi' && secrets.PYPI_API_TOKEN || secrets.TEST_PYPI_API_TOKEN }}
      run: |
        cd deployments/${{ matrix.reference.dir }}
        TARGET="${{ needs.check-conditions.outputs.target_repo }}"
        
        echo "📦 Publishing ${{ matrix.reference.name }} v${{ steps.version.outputs.version }} to $TARGET..."
        
        if [ "$TARGET" == "pypi" ]; then
          twine upload dist/* --skip-existing --non-interactive
        else
          twine upload --repository-url https://test.pypi.org/legacy/ dist/* --skip-existing --non-interactive
        fi
        
        echo "✅ ${{ matrix.reference.name }} published to $TARGET"

  # ==========================================================================
  # Deploy (only when [publish:deploy] or manual deploy=true)
  # ==========================================================================
  deploy:
    name: Validate Ingestion Deployment
    needs: [check-conditions, publish-others]
    if: needs.check-conditions.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    # Only validate the Beam ingestion pipeline here.
    # dbt/Airflow deployments (bigquery-to-mapped-product, data-pipeline-orchestrator)
    # have resolution-too-deep issues with heavy deps and are validated by deploy-generic.yml.

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Build local wheels
      run: |
        pip install --upgrade pip build
        mkdir -p /tmp/local-wheels
        for lib in gcp-pipeline-core gcp-pipeline-beam gcp-pipeline-orchestration gcp-pipeline-transform gcp-pipeline-tester gcp-pipeline-framework; do
          python -m build ./gcp-pipeline-libraries/$lib --outdir /tmp/local-wheels --wheel
        done
        echo "Built wheels:"
        ls /tmp/local-wheels/

    - name: Install deployment dependencies
      run: |
        # Step 1: Install local wheels directly by file path (guarantees local code, not PyPI)
        pip install /tmp/local-wheels/*.whl

        # Step 2: Install deployment with --no-deps (all framework deps already installed above)
        cd deployments/original-data-to-bigqueryload
        pip install --no-deps -e . || pip install --no-deps .

    - name: Validate deployment
      run: |
        echo "🔍 Validating original-data-to-bigqueryload..."
        cd deployments/original-data-to-bigqueryload

        if [ -d tests ]; then
          pip install pytest pytest-mock
          pytest tests/unit -v --tb=short -x || {
            echo "❌ Deployment validation failed"
            exit 1
          }
        fi

        echo "✅ original-data-to-bigqueryload validated successfully"

    - name: Deployment ready notification
      run: |
        echo "## 🚀 Deployment Ready: ${{ matrix.deployment }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Library Source | ${{ needs.check-conditions.outputs.target_repo }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deployment | ${{ matrix.deployment }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Status | ✅ Ready for deployment |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Create GitHub Release - Auto-generates release notes on production publish
  # ==========================================================================
  create-release:
    name: Create GitHub Release
    needs: [check-conditions, publish-core, publish-others]
    if: |
      always() &&
      needs.publish-others.result == 'success' &&
      needs.check-conditions.outputs.target_repo == 'pypi'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create release with auto-generated notes
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ needs.publish-core.outputs.version }}"
        TAG="v$VERSION"

        echo "Creating GitHub release $TAG..."

        # Create tag if it doesn't exist
        if ! git rev-parse "$TAG" >/dev/null 2>&1; then
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag $TAG"
        else
          echo "Tag $TAG already exists"
        fi

        # Create release with auto-generated notes (skip if already exists)
        gh release create "$TAG" \
          --title "v$VERSION" \
          --generate-notes \
          --latest \
        || echo "Release $TAG already exists, skipping"

  # ==========================================================================
  # Summary - Generate comprehensive publish report
  # ==========================================================================
  summary:
    name: Publish Summary
    needs: [check-conditions, publish-core, publish-others, publish-references, deploy, create-release]
    if: always() && needs.check-conditions.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: dist-*
      continue-on-error: true

    - name: Generate Summary
      run: |
        echo "# 📦 Library Publish Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Configuration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Target Repository | \`${{ needs.check-conditions.outputs.target_repo }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Triggered | ${{ needs.check-conditions.outputs.should_deploy }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Is Release | ${{ needs.check-conditions.outputs.is_release }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Core Version | ${{ needs.publish-core.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Published Libraries" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Library | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-core | ${{ needs.publish-core.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-beam | ${{ needs.publish-others.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-orchestration | ${{ needs.publish-others.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-transform | ${{ needs.publish-others.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-tester | ${{ needs.publish-others.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| gcp-pipeline-framework | ${{ needs.publish-others.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Reference Implementations" >> $GITHUB_STEP_SUMMARY
