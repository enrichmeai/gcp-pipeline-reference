name: Publish Libraries to PyPI

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: 'PyPI repository to publish to'
        required: true
        default: 'pypi'
        type: choice
        options:
        - pypi
        - testpypi

jobs:
  test:
    name: Test Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        library: [gcp-pipeline-core, gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester, gcp-pipeline-framework]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core first as others depend on it
        if [ "${{ matrix.library }}" != "gcp-pipeline-core" ]; then
          pip install ./gcp-pipeline-libraries/gcp-pipeline-core
        fi
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -f pyproject.toml ]; then
          pip install .[dev] || pip install .
        fi
        pip install pytest pytest-cov

    - name: Run Tests
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -d tests ]; then
          # For transform library, we might need dbt to be installed if it's not in [dev]
          if [ "${{ matrix.library }}" == "gcp-pipeline-transform" ]; then
             pip install dbt-bigquery
          fi
          pytest tests/unit -v
        else
          echo "No tests found for ${{ matrix.library }}"
        fi

  publish-core:
    name: Publish Core Library
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: pip install build twine

    - name: Build and Publish Core
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        TEST_TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        cd gcp-pipeline-libraries/gcp-pipeline-core
        python -m build
        
        # Publish to production or test based on event/input
        if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "release" ] || [ "${{ github.event.inputs.repository }}" == "pypi" ]; then
          twine upload dist/* --skip-existing
        elif [ "${{ github.event.inputs.repository }}" == "testpypi" ]; then
          twine upload --repository testpypi dist/* --skip-existing --password $TEST_TWINE_PASSWORD
        fi

  publish-others:
    name: Publish Dependent Libraries
    needs: publish-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        library: [gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester, gcp-pipeline-framework]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: pip install build twine

    - name: Build and Publish
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        TEST_TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        python -m build
        
        # Publish to production or test based on event/input
        if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "release" ] || [ "${{ github.event.inputs.repository }}" == "pypi" ]; then
          twine upload dist/* --skip-existing
        elif [ "${{ github.event.inputs.repository }}" == "testpypi" ]; then
          twine upload --repository testpypi dist/* --skip-existing --password $TEST_TWINE_PASSWORD
        fi
