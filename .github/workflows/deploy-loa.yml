name: Deploy LOA to GCP (DEV)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'blueprint/components/loa_common/**'
      - 'blueprint/components/loa_pipelines/**'
      - 'blueprint/components/schemas/**'
      - 'blueprint/components/requirements.txt'
      - '.github/workflows/deploy-loa.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  REGION: 'europe-west2'  # London, UK

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd blueprint/components
          pip install -r requirements.txt
          pip install pytest flake8 black

      - name: Lint code
        run: |
          cd blueprint/components
          black --check loa_common/ loa_pipelines/ || true
          flake8 loa_common/ loa_pipelines/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: |
          cd blueprint/components
          pytest tests/ -v --tb=short || echo "Tests not yet implemented"

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd blueprint/components
          pip install -r requirements.txt
          pip install google-cloud-bigquery google-cloud-storage apache-beam[gcp]

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}

      - name: Create BigQuery dataset if not exists
        run: |
          bq mk --dataset \
            --location=${{ env.REGION }} \
            ${{ secrets.GCP_PROJECT_ID_DEV }}:loa_dev || echo "Dataset already exists"

      - name: Update BigQuery tables
        run: |
          # Create or update applications_raw table
          bq mk --table \
            --schema=blueprint/components/schemas/applications_raw.json \
            --time_partitioning_field=processed_timestamp \
            --clustering_fields=run_id,application_date \
            ${{ secrets.GCP_PROJECT_ID_DEV }}:loa_dev.applications_raw || \
          bq update \
            --schema=blueprint/components/schemas/applications_raw.json \
            ${{ secrets.GCP_PROJECT_ID_DEV }}:loa_dev.applications_raw

          # Create or update applications_errors table
          bq mk --table \
            --schema=blueprint/components/schemas/applications_errors.json \
            --time_partitioning_field=processed_timestamp \
            --clustering_fields=run_id,error_field \
            ${{ secrets.GCP_PROJECT_ID_DEV }}:loa_dev.applications_errors || \
          bq update \
            --schema=blueprint/components/schemas/applications_errors.json \
            ${{ secrets.GCP_PROJECT_ID_DEV }}:loa_dev.applications_errors

      - name: Deploy Dataflow template
        run: |
          cd blueprint/components
          python loa_pipelines/loa_jcl_template.py \
            --project=${{ secrets.GCP_PROJECT_ID_DEV }} \
            --region=${{ env.REGION }} \
            --runner=DataflowRunner \
            --staging_location=gs://${{ secrets.GCS_BUCKET_DEV }}/staging \
            --temp_location=gs://${{ secrets.GCS_BUCKET_DEV }}/temp \
            --template_location=gs://${{ secrets.GCS_BUCKET_DEV }}/templates/loa_pipeline_template \
            --setup_file=./setup.py \
            --save_main_session

      - name: Deployment summary
        run: |
          echo "✅ LOA deployed to DEV environment"
          echo "Project: ${{ secrets.GCP_PROJECT_ID_DEV }}"
          echo "Region: ${{ env.REGION }}"
          echo "Dataset: loa_dev"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: always()
    steps:
      - name: Notify Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "LOA Deployment ${{ needs.deploy-dev.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*LOA Pipeline Deployment (DEV)*\nStatus: ${{ needs.deploy-dev.result }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Teams
        if: ${{ secrets.TEAMS_WEBHOOK_URL != '' }}
        run: |
          curl -H 'Content-Type: application/json' \
            -d '{
              "text": "LOA Deployment ${{ needs.deploy-dev.result }}",
              "title": "LOA Pipeline Deployment (DEV)",
              "themeColor": "${{ needs.deploy-dev.result == 'success' && '00FF00' || 'FF0000' }}"
            }' \
            ${{ secrets.TEAMS_WEBHOOK_URL }}

