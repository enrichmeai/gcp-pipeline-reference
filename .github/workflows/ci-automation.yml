name: CI Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov flake8
          
          # Install all libraries in editable mode to ensure their dependencies are installed
          # core first
          pip install -e gcp-pipeline-libraries/gcp-pipeline-core
          pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
          pip install -e gcp-pipeline-libraries/gcp-pipeline-orchestration
          pip install -e gcp-pipeline-libraries/gcp-pipeline-transform
          pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

          # dbt-bigquery is needed for transform library tests
          pip install dbt-bigquery

      - name: Run All Local Checks
        run: |
          chmod +x scripts/automation/run_all_checks.sh
          chmod +x scripts/run_library_tests.sh
          ./scripts/automation/run_all_checks.sh

  e2e-dry-run:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3
      - name: Validate Deployment Scripts
        run: |
          # Bash syntax check for all automation scripts
          find scripts/automation -name "*.sh" -exec bash -n {} \;
          echo "All automation scripts passed syntax check."
