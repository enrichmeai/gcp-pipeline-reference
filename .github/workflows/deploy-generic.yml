name: Deploy Generic

# =============================================================================
# Deployment Workflow
#
# Deploys 3 pipelines using gcp-pipeline-framework from PyPI:
#   1. original-data-to-bigqueryload  → Dataflow Flex Template (ingestion)
#   2. bigquery-to-mapped-product     → dbt models (transformation)
#   3. data-pipeline-orchestrator     → Airflow DAGs (orchestration)
#
# Trigger modes:
#   - Automatic: Push to main branch (path-filtered deploy)
#   - Manual:    workflow_dispatch with environment selection
#
# NOTE: Deploy does NOT auto-trigger after publish. Publish and deploy
# are separate steps to avoid race conditions. Publish first, verify
# libraries on PyPI, then deploy via separate commit or manual trigger.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'deployments/original-data-to-bigqueryload/**'
      - 'deployments/bigquery-to-mapped-product/**'
      - 'deployments/fdp-to-consumable-product/**'
      - 'deployments/data-pipeline-orchestrator/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-generic.yml'
  # NOTE: No workflow_run trigger from publish. Publish and deploy are
  # separate steps. Publish libraries first, verify on PyPI, then deploy
  # via a separate commit or manual workflow_dispatch.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'int'
        type: choice
        options:
          - int
      library_version:
        description: 'Library version to deploy (leave empty to use published 1.0.7)'
        required: false
        default: ''
        type: string

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'int' }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  GCP_REGION: 'europe-west2'
  ENVIRONMENT: ${{ github.event.inputs.environment || 'int' }}
  FRAMEWORK_VERSION: '1.0.28'  # fallback if PyPI fetch fails; fetch-version resolves latest automatically

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================================================
  # Detect which deployments changed (skip unchanged on push)
  # ==========================================================================
  detect-changes:
    name: Detect Changed Deployments
    runs-on: ubuntu-latest
    outputs:
      ingestion: ${{ steps.changes.outputs.ingestion }}
      transformation: ${{ steps.changes.outputs.transformation }}
      cdp: ${{ steps.changes.outputs.cdp }}
      orchestration: ${{ steps.changes.outputs.orchestration }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
      workflow: ${{ steps.changes.outputs.workflow }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Detect changed paths
      id: changes
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # Manual trigger: deploy everything
          echo "ingestion=true" >> $GITHUB_OUTPUT
          echo "transformation=true" >> $GITHUB_OUTPUT
          echo "cdp=true" >> $GITHUB_OUTPUT
          echo "orchestration=true" >> $GITHUB_OUTPUT
          echo "infrastructure=true" >> $GITHUB_OUTPUT
          echo "workflow=true" >> $GITHUB_OUTPUT
          echo "Manual trigger — all deployments enabled"
        else
          # Push trigger: only deploy what changed
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          echo "ingestion=$(echo "$CHANGED" | grep -q '^deployments/original-data-to-bigqueryload/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "transformation=$(echo "$CHANGED" | grep -q '^deployments/bigquery-to-mapped-product/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "cdp=$(echo "$CHANGED" | grep -q '^deployments/fdp-to-consumable-product/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "orchestration=$(echo "$CHANGED" | grep -q '^deployments/data-pipeline-orchestrator/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "infrastructure=$(echo "$CHANGED" | grep -q '^infrastructure/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "workflow=$(echo "$CHANGED" | grep -q '^.github/workflows/deploy-generic.yml' && echo true || echo false)" >> $GITHUB_OUTPUT
        fi

  # ==========================================================================
  # Resolve Library Version from PyPI
  # ==========================================================================
  fetch-version:
    name: Resolve Framework Version
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Resolve gcp-pipeline-framework version
        id: get-version
        run: |
          # Use explicitly specified version, or fetch latest from PyPI
          if [ -n "${{ github.event.inputs.library_version }}" ]; then
            VERSION="${{ github.event.inputs.library_version }}"
            echo "Using specified version: $VERSION"
          else
            # Fetch the latest published version of gcp-pipeline-framework
            FETCHED=$(pip index versions gcp-pipeline-framework 2>/dev/null \
              | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "")
            VERSION="${FETCHED:-${{ env.FRAMEWORK_VERSION }}}"
            echo "Resolved version from PyPI: $VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Framework version to deploy: $VERSION"

  # ==========================================================================
  # Test deployments with the published framework version
  # ==========================================================================
  test:
    name: Test Deployments
    runs-on: ubuntu-latest
    needs: fetch-version
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install gcp-pipeline-framework from PyPI
      run: |
        python -m pip install --upgrade pip
        VERSION="${{ needs.fetch-version.outputs.version }}"
        echo "Installing gcp-pipeline-framework==$VERSION from PyPI..."
        pip install "gcp-pipeline-framework==$VERSION"
        echo ""
        echo "Installed versions:"
        pip show gcp-pipeline-framework | grep Version
        pip show gcp-pipeline-core | grep Version
        pip show gcp-pipeline-beam | grep Version

    - name: Test original-data-to-bigqueryload
      run: |
        cd deployments/original-data-to-bigqueryload
        pip install -e ".[dev]" || pip install -e .
        PYTHONPATH=src pytest tests/unit -v --tb=short

    - name: Test fdp-to-consumable-product
      run: |
        cd deployments/fdp-to-consumable-product
        pip install -e ".[dev]"
        pytest tests/ -v --tb=short

  # ==========================================================================
  # Deploy Infrastructure
  # ==========================================================================
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [fetch-version, test]
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'int' }}

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set GCP Project
      run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    - name: Enable GCP Services
      run: |
        chmod +x scripts/gcp/01_enable_services.sh
        ./scripts/gcp/01_enable_services.sh || echo "Some services may already be enabled"

    - name: Create Terraform State Bucket
      run: |
        chmod +x scripts/gcp/02_create_state_bucket.sh
        ./scripts/gcp/02_create_state_bucket.sh || echo "State bucket may already exist"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - name: Terraform Init
      env:
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_environment: ${{ github.event.inputs.environment || 'int' }}
        TF_VAR_gcp_region: europe-west2
        TF_VAR_bq_location: europe-west2
        TF_VAR_force_destroy: "true"
        TF_VAR_enable_versioning: "true"
      run: |
        cd infrastructure/terraform/systems/generic
        ENV="${{ github.event.inputs.environment || 'int' }}"
        terraform init \
          -backend-config="bucket=gcp-pipeline-terraform-state" \
          -backend-config="prefix=generic/${ENV}"

    - name: Terraform Import Existing Resources
      env:
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_environment: ${{ github.event.inputs.environment || 'int' }}
        TF_VAR_gcp_region: europe-west2
        TF_VAR_bq_location: europe-west2
        TF_VAR_force_destroy: "true"
        TF_VAR_enable_versioning: "true"
      run: |
        cd infrastructure/terraform/systems/generic
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"

        # Import existing resources into state (idempotent — skips if already in state)
        import_resource() {
          local addr=$1
          local id=$2
          if terraform state show "$addr" &>/dev/null; then
            echo "  Already in state: $addr"
          else
            echo "  Importing: $addr"
            terraform import "$addr" "$id" || echo "  Warning: import failed for $addr (may not exist yet)"
          fi
        }

        echo "=== Importing existing GCS buckets ==="
        import_resource "google_storage_bucket.landing" "${PROJECT_ID}-generic-${ENV}-landing"
        import_resource "google_storage_bucket.archive" "${PROJECT_ID}-generic-${ENV}-archive"
        import_resource "google_storage_bucket.error" "${PROJECT_ID}-generic-${ENV}-error"
        import_resource "google_storage_bucket.temp" "${PROJECT_ID}-generic-${ENV}-temp"

        echo "=== Importing existing Pub/Sub ==="
        import_resource "google_pubsub_topic.generic_file_notifications" "projects/${PROJECT_ID}/topics/generic-file-notifications"
        import_resource "google_pubsub_topic.generic_dead_letter" "projects/${PROJECT_ID}/topics/generic-file-notifications-dead-letter"
        import_resource "google_pubsub_subscription.generic_file_notifications_sub" "projects/${PROJECT_ID}/subscriptions/generic-file-notifications-sub"

        echo "=== Importing existing BigQuery datasets ==="
        import_resource "google_bigquery_dataset.odp_generic" "projects/${PROJECT_ID}/datasets/odp_generic"
        import_resource "google_bigquery_dataset.fdp_generic" "projects/${PROJECT_ID}/datasets/fdp_generic"
        import_resource "google_bigquery_dataset.job_control" "projects/${PROJECT_ID}/datasets/job_control"
        import_resource "google_bigquery_dataset.cdp_generic" "projects/${PROJECT_ID}/datasets/cdp_generic"

        echo "=== Importing existing BigQuery tables ==="
        for entity in customers accounts decision applications; do
          import_resource "google_bigquery_table.odp_${entity}" "projects/${PROJECT_ID}/datasets/odp_generic/tables/${entity}"
          import_resource "google_bigquery_table.odp_${entity}_errors" "projects/${PROJECT_ID}/datasets/odp_generic/tables/${entity}_errors"
        done
        import_resource "google_bigquery_table.fdp_event_transaction_excess" "projects/${PROJECT_ID}/datasets/fdp_generic/tables/event_transaction_excess"
        import_resource "google_bigquery_table.fdp_portfolio_account_excess" "projects/${PROJECT_ID}/datasets/fdp_generic/tables/portfolio_account_excess"
        import_resource "google_bigquery_table.fdp_portfolio_account_facility" "projects/${PROJECT_ID}/datasets/fdp_generic/tables/portfolio_account_facility"
        import_resource "google_bigquery_table.pipeline_jobs" "projects/${PROJECT_ID}/datasets/job_control/tables/pipeline_jobs"
        import_resource "google_bigquery_table.audit_trail" "projects/${PROJECT_ID}/datasets/job_control/tables/audit_trail"

        echo "=== Importing existing service accounts ==="
        import_resource "google_service_account.generic_dataflow" "projects/${PROJECT_ID}/serviceAccounts/generic-${ENV}-dataflow@${PROJECT_ID}.iam.gserviceaccount.com"
        import_resource "google_service_account.generic_dbt" "projects/${PROJECT_ID}/serviceAccounts/generic-${ENV}-dbt@${PROJECT_ID}.iam.gserviceaccount.com"
        import_resource "google_service_account.generic_composer" "projects/${PROJECT_ID}/serviceAccounts/generic-composer-sa@${PROJECT_ID}.iam.gserviceaccount.com"

        echo "=== Import complete ==="

    - name: Terraform Plan
      env:
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_environment: ${{ github.event.inputs.environment || 'int' }}
        TF_VAR_gcp_region: europe-west2
        TF_VAR_bq_location: europe-west2
        TF_VAR_force_destroy: "true"
        TF_VAR_enable_versioning: "true"
      run: |
        cd infrastructure/terraform/systems/generic
        ENV="${{ github.event.inputs.environment || 'int' }}"
        echo "=== Terraform Plan for environment: $ENV ==="
        terraform plan -out=tfplan
        echo "=== Plan complete ==="

    - name: Terraform Apply
      env:
        TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_environment: ${{ github.event.inputs.environment || 'int' }}
        TF_VAR_gcp_region: europe-west2
        TF_VAR_bq_location: europe-west2
        TF_VAR_force_destroy: "true"
        TF_VAR_enable_versioning: "true"
      run: |
        cd infrastructure/terraform/systems/generic
        ENV="${{ github.event.inputs.environment || 'int' }}"
        echo "=== Applying Terraform for environment: $ENV ==="
        terraform apply -auto-approve tfplan

    - name: Validate Infrastructure (scripts)
      env:
        ENVIRONMENT: ${{ github.event.inputs.environment || 'int' }}
      run: |
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"

        echo "=== Validating Terraform-provisioned infrastructure ==="

        echo "GCS Buckets (generic-$ENV):"
        gsutil ls -p $PROJECT_ID 2>/dev/null | grep "generic-${ENV}" || echo "  MISSING"

        echo "BigQuery Datasets:"
        bq ls --project_id=$PROJECT_ID 2>/dev/null | grep -E "odp_generic|fdp_generic|job_control|cdp_generic" || echo "  MISSING"

        echo "Pub/Sub Topics:"
        gcloud pubsub topics list --project=$PROJECT_ID 2>/dev/null | grep "generic" || echo "  MISSING"

        echo "Cloud Composer:"
        gcloud composer environments describe "generic-${ENV}-composer" \
          --location=${{ env.GCP_REGION }} --project=$PROJECT_ID \
          --format='value(state)' 2>/dev/null || echo "  NOT PROVISIONED"

        echo "=== Validation complete ==="

  # ==========================================================================
  # Deploy Dataflow Flex Template (original-data-to-bigqueryload)
  # ==========================================================================
  deploy-dataflow:
    name: Deploy Dataflow Template (ingestion)
    runs-on: ubuntu-latest
    needs: [fetch-version, deploy-infrastructure, detect-changes]
    if: needs.detect-changes.outputs.ingestion == 'true' || needs.detect-changes.outputs.workflow == 'true'
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment || 'int' }}
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Push Ingestion Docker Image
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        echo "Building Ingestion image with gcp-pipeline-framework==$VERSION"
        gcloud builds submit . \
          --config deployments/original-data-to-bigqueryload/cloudbuild.yaml \
          --substitutions _LIBRARY_VERSION=$VERSION \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --timeout=3300s

    - name: Create Dataflow Flex Template
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        ENV="${{ github.event.inputs.environment || 'int' }}"
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

        gcloud dataflow flex-template build \
          gs://${PROJECT_ID}-generic-${ENV}-temp/templates/generic_ingestion_v${VERSION}.json \
          --image gcr.io/${PROJECT_ID}/generic-ingestion:$VERSION \
          --sdk-language PYTHON \
          --metadata-file deployments/original-data-to-bigqueryload/metadata.json \
          --project ${PROJECT_ID}

        gsutil cp \
          gs://${PROJECT_ID}-generic-${ENV}-temp/templates/generic_ingestion_v${VERSION}.json \
          gs://${PROJECT_ID}-generic-${ENV}-temp/templates/generic_ingestion_latest.json \
          || true

  # ==========================================================================
  # Deploy dbt Models (bigquery-to-mapped-product)
  # ==========================================================================
  deploy-dbt:
    name: Deploy dbt Models (transformation)
    runs-on: ubuntu-latest
    needs: [fetch-version, deploy-infrastructure, detect-changes]
    if: needs.detect-changes.outputs.transformation == 'true' || needs.detect-changes.outputs.workflow == 'true'
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'int' }}
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Push dbt Docker Image
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        echo "Building dbt image with gcp-pipeline-framework==$VERSION"
        gcloud builds submit . \
          --config deployments/bigquery-to-mapped-product/cloudbuild.yaml \
          --substitutions _LIBRARY_VERSION=$VERSION \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --timeout=2400s

    - name: Run dbt via Cloud Build
      run: |
        gcloud builds submit \
          --config deployments/bigquery-to-mapped-product/dbt/cloudbuild.yaml \
          --substitutions _PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          deployments/bigquery-to-mapped-product/dbt

  # ==========================================================================
  # Deploy CDP Models (fdp-to-consumable-product)
  # ==========================================================================
  deploy-cdp:
    name: Deploy CDP Models (consumable product)
    runs-on: ubuntu-latest
    needs: [fetch-version, deploy-infrastructure, deploy-dbt, detect-changes]
    if: false  # CDP disabled until image is rebuilt with dbt deps fix
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'int' }}
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Push CDP Docker Image
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        echo "Building CDP image with gcp-pipeline-framework==$VERSION"
        gcloud builds submit . \
          --config deployments/fdp-to-consumable-product/cloudbuild.yaml \
          --substitutions _LIBRARY_VERSION=$VERSION \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --timeout=2400s

    - name: Run CDP dbt via Cloud Build
      run: |
        gcloud builds submit \
          --config deployments/fdp-to-consumable-product/dbt/cloudbuild.yaml \
          --substitutions _PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          deployments/fdp-to-consumable-product/dbt

  # ==========================================================================
  # Deploy Airflow DAGs (data-pipeline-orchestrator)
  # ==========================================================================
  deploy-airflow:
    name: Deploy Airflow DAGs (orchestration)
    runs-on: ubuntu-latest
    needs: [fetch-version, deploy-infrastructure, detect-changes]
    if: needs.detect-changes.outputs.orchestration == 'true' || needs.detect-changes.outputs.workflow == 'true'
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'int' }}
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Push DAG Validator Image
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        echo "Building DAG validator image with gcp-pipeline-framework==$VERSION"
        gcloud builds submit . \
          --config deployments/data-pipeline-orchestrator/cloudbuild.yaml \
          --substitutions _LIBRARY_VERSION=$VERSION \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --timeout=2400s

    - name: Install PyPI packages on Composer
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"
        COMPOSER_ENV="generic-${ENV}-composer"

        echo "Installing packages on $COMPOSER_ENV"
        echo "  - gcp-pipeline-core==${VERSION}"
        echo "  - gcp-pipeline-orchestration==${VERSION}"
        echo "  - apache-airflow-providers-google>=10.0.0 (for Dataflow operators)"

        # Use || true to handle "no change" error when packages are already installed via Terraform
        gcloud composer environments update $COMPOSER_ENV \
          --location=${{ env.GCP_REGION }} \
          --project=$PROJECT_ID \
          --update-pypi-package "gcp-pipeline-core==${VERSION}" \
          --update-pypi-package "gcp-pipeline-orchestration==${VERSION}" \
          --update-pypi-package "apache-airflow-providers-google>=10.0.0" \
          || echo "Packages already installed or no changes needed"

        echo "Composer environment updated with orchestration packages"

    - name: Upload DAGs to Cloud Composer
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        VERSION="${LIBRARY_VERSION}"
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"
        COMPOSER_ENV="generic-${ENV}-composer"

        echo "Deploying DAGs (framework v$VERSION) to Composer: $COMPOSER_ENV"

        DAGS_BUCKET=$(gcloud composer environments describe $COMPOSER_ENV \
            --location=${{ env.GCP_REGION }} \
            --project=$PROJECT_ID \
            --format='value(config.dagGcsPrefix)' 2>/dev/null) || true

        if [ -n "$DAGS_BUCKET" ]; then
          # Clean up any stale library code that may have been accidentally uploaded
          # Libraries should be installed via PyPI, NOT copied to DAGs folder
          # This prevents "relative import beyond top-level package" errors
          echo "Cleaning up ALL stale library code from DAGs bucket..."
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_core 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_orchestration 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_beam 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_transform 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_tester 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/gcp_pipeline_framework 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/generic/__pycache__ 2>/dev/null || true
          
          # Also clean root dags folder for any stale packages
          gsutil -m rm -rf ${DAGS_BUCKET}/gcp_pipeline_core 2>/dev/null || true
          gsutil -m rm -rf ${DAGS_BUCKET}/gcp_pipeline_orchestration 2>/dev/null || true
          
          echo "Cleanup complete. Now uploading only DAG .py files..."

          # DAGs are pre-generated and committed to git (via generate_dags.py)
          # All config is baked in at generation time — no runtime config needed
          # Only upload actual DAG files (not __init__.py - DAGs are standalone scripts)
          gsutil -m cp deployments/data-pipeline-orchestrator/dags/generic_*.py ${DAGS_BUCKET}/generic/
          echo "version=$VERSION" | gsutil cp - ${DAGS_BUCKET}/generic/.version

          # Remove any stale files (config, __init__.py)
          gsutil -m rm -r ${DAGS_BUCKET}/generic/config 2>/dev/null || true
          gsutil -m rm -r ${DAGS_BUCKET}/config 2>/dev/null || true
          gsutil rm ${DAGS_BUCKET}/generic/__init__.py 2>/dev/null || true

          echo "DAGs deployed to $DAGS_BUCKET/generic/"
        else
          echo "Composer environment '$COMPOSER_ENV' not found - skipping DAG upload"
        fi

    - name: Configure Airflow Variables
      run: |
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"
        COMPOSER_ENV="generic-${ENV}-composer"
        REGION="${{ env.GCP_REGION }}"

        echo "Setting Airflow Variables for $COMPOSER_ENV..."

        # Set required variables
        gcloud composer environments run $COMPOSER_ENV \
          --location=$REGION \
          variables set -- gcp_project_id $PROJECT_ID || true

        gcloud composer environments run $COMPOSER_ENV \
          --location=$REGION \
          variables set -- gcp_region $REGION || true

        gcloud composer environments run $COMPOSER_ENV \
          --location=$REGION \
          variables set -- environment $ENV || true

        gcloud composer environments run $COMPOSER_ENV \
          --location=$REGION \
          variables set -- dataflow_templates_bucket ${PROJECT_ID}-generic-${ENV}-temp || true

        gcloud composer environments run $COMPOSER_ENV \
          --location=$REGION \
          variables set -- generic_pubsub_subscription generic-file-notifications-sub || true

        echo "Airflow Variables configured"

  # ==========================================================================
  # Validate Deployment
  # ==========================================================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [fetch-version, deploy-infrastructure, deploy-dataflow, deploy-dbt, deploy-cdp, deploy-airflow]
    if: needs.deploy-infrastructure.result == 'success'
    timeout-minutes: 10
    environment: ${{ github.event.inputs.environment || 'int' }}

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Validate All Resources
      env:
        LIBRARY_VERSION: ${{ needs.fetch-version.outputs.version }}
      run: |
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"
        VERSION="${LIBRARY_VERSION}"

        echo "=============================================="
        echo "  Deployment Validation"
        echo "  Environment:      $ENV"
        echo "  Framework:        gcp-pipeline-framework==$VERSION"
        echo "=============================================="

        echo ""
        echo "GCS Buckets (generic-$ENV):"
        gsutil ls -p $PROJECT_ID 2>/dev/null | grep "generic-${ENV}" || echo "  Not found"

        echo ""
        echo "BigQuery Datasets:"
        bq ls --project_id=$PROJECT_ID 2>/dev/null | grep -E "odp_generic|fdp_generic|job_control" || echo "  Not found"

        echo ""
        echo "Pub/Sub Topics:"
        gcloud pubsub topics list --project=$PROJECT_ID 2>/dev/null | grep "generic" || echo "  Not found"

        echo ""
        echo "Docker Images:"
        echo "  Ingestion:"
        gcloud container images list-tags gcr.io/$PROJECT_ID/generic-ingestion \
          --limit=3 --format='table(tags,timestamp)' 2>/dev/null || echo "    Not found"
        echo "  Transformation (MAP):"
        gcloud container images list-tags gcr.io/$PROJECT_ID/generic-transformation \
          --limit=3 --format='table(tags,timestamp)' 2>/dev/null || echo "    Not found"
        echo "  Transformation (CDP):"
        gcloud container images list-tags gcr.io/$PROJECT_ID/generic-cdp-transformation \
          --limit=3 --format='table(tags,timestamp)' 2>/dev/null || echo "    Not found"

        echo ""
        echo "Dataflow Templates:"
        gsutil ls gs://${PROJECT_ID}-generic-${ENV}-temp/templates/ 2>/dev/null || echo "  Not found"

        echo ""
        echo "Composer Environment:"
        gcloud composer environments describe generic-${ENV}-composer \
          --location=${{ env.GCP_REGION }} --project=$PROJECT_ID \
          --format='value(state)' 2>/dev/null || echo "  Not found"

        echo ""
        echo "=============================================="
        echo "  Validation Complete (framework v$VERSION)"
        echo "=============================================="

  # ==========================================================================
  # E2E Tests — run locally, not in CI
  # ==========================================================================
  # E2E tests are run locally after deployment using:
  #   ./scripts/gcp/deploy_dags_and_test.sh --test-only
  #   ./scripts/gcp/e2e_pipeline_test.sh --timeout 2400
  #
  # They require a running Composer environment and take 20-40 min
  # (Dataflow cold starts). Not suitable for CI runners.
  # ==========================================================================

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [fetch-version, test, deploy-infrastructure, deploy-dataflow, deploy-dbt, deploy-cdp, deploy-airflow, validate]
    if: always()

    steps:
    - name: Generate Summary
      run: |
        VERSION="${{ needs.fetch-version.outputs.version }}"
        ENV="${{ github.event.inputs.environment || 'int' }}"

        echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
        echo "**Framework:** \`gcp-pipeline-framework==$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Deployments" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Deployment | Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| original-data-to-bigqueryload | Dataflow Template | ${{ needs.deploy-dataflow.result == 'success' && '✅' || needs.deploy-dataflow.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| bigquery-to-mapped-product | dbt Models (MAP) | ${{ needs.deploy-dbt.result == 'success' && '✅' || needs.deploy-dbt.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| fdp-to-consumable-product | dbt Models (CDP) | ${{ needs.deploy-cdp.result == 'success' && '✅' || needs.deploy-cdp.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| data-pipeline-orchestrator | Airflow DAGs | ${{ needs.deploy-airflow.result == 'success' && '✅' || needs.deploy-airflow.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Pipeline" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Resolve Version | ${{ needs.fetch-version.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Infrastructure | ${{ needs.deploy-infrastructure.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Validate | ${{ needs.validate.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E Tests | ⏭️ (run locally) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Ingestion image: \`gcr.io/*/generic-ingestion:$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- Transformation (MAP) image: \`gcr.io/*/generic-transformation:$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- Transformation (CDP) image: \`gcr.io/*/generic-cdp-transformation:$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- Flex Template: \`gs://*/templates/generic_ingestion_v$VERSION.json\`" >> $GITHUB_STEP_SUMMARY
        echo "- DAGs: Cloud Composer \`generic-${ENV}-composer\`" >> $GITHUB_STEP_SUMMARY
