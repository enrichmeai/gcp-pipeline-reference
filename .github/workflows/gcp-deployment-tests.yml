name: GCP Deployment Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'deployments/**'
      - 'gdw_data_core/**'
      - '.github/workflows/gcp-deployment-tests.yml'
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly comprehensive tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      deployment:
        description: 'Deployment to test (em, loa, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - em
          - loa
          - all

env:
  PYTHON_VERSION: "3.11"
  GCP_REGION: "europe-west2"

jobs:
  # ============================================================================
  # Unit Tests - Fast feedback, no external resources
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        deployment: [em]  # Add 'loa' when ready

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./gdw_data_core
          pip install -e ./deployments
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest deployments/${{ matrix.deployment }}/tests/unit/ \
            -v \
            --cov=deployments/${{ matrix.deployment }} \
            --cov=gdw_data_core \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not requires_gcp"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: ${{ matrix.deployment }}-unittests
          name: codecov-${{ matrix.deployment }}
          fail_ci_if_error: false

  # ============================================================================
  # Integration Tests - GCP services mocked
  # ============================================================================
  integration-tests:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        deployment: [em]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./gdw_data_core
          pip install -e ./deployments
          pip install pytest pytest-cov

      - name: Run integration tests
        run: |
          pytest deployments/${{ matrix.deployment }}/tests/integration/ \
            -v \
            -m "not requires_gcp"

      - name: Generate coverage report
        if: always()
        run: |
          pytest deployments/${{ matrix.deployment }}/tests/integration/ \
            -v \
            --cov=deployments/${{ matrix.deployment }} \
            --cov-report=xml \
            -m "not requires_gcp"

  # ============================================================================
  # DAG Tests - Airflow DAG parsing and validation
  # ============================================================================
  dag-tests:
    name: DAG Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        deployment: [em]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./gdw_data_core
          pip install -e ./deployments
          pip install pytest apache-airflow

      - name: Run DAG tests
        run: |
          pytest deployments/${{ matrix.deployment }}/tests/unit/orchestration/ \
            -v \
            --tb=short

      - name: Test DAG instantiation (${{ matrix.deployment }})
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          
          # Test EM DAG
          if '${{ matrix.deployment }}' == 'em':
              from deployments.em.orchestration.airflow.dags.em_daily_load_dag import dag
              assert dag is not None
              print('✅ EM DAG instantiation test passed')
          "

  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy

      - name: Run Black (code formatting check)
        run: black --check deployments/ gdw_data_core/ --exclude '__pycache__|\.egg-info'
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: flake8 deployments/ gdw_data_core/ --max-line-length=100 --select=E9,F63,F7,F82
        continue-on-error: true

      - name: Run mypy (type checking)
        run: mypy deployments/ gdw_data_core/ --ignore-missing-imports
        continue-on-error: true

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r deployments/ gdw_data_core/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run Safety (dependency vulnerability check)
        run: |
          pip install safety
          safety check --json > safety-report.json || true
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ============================================================================
  # Performance Tests - Run nightly
  # ============================================================================
  performance-tests:
    name: Performance & Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[performance]')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./gdw_data_core
          pip install -e ./deployments
          pip install pytest pytest-benchmark

      - name: Run performance benchmarks
        run: |
          pytest deployments/em/tests/performance/ \
            -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json
        continue-on-error: true

      - name: Run chaos engineering tests
        run: |
          pytest deployments/em/tests/chaos/ \
            -v
        continue-on-error: true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: benchmark-results.json

  # ============================================================================
  # Staging GCP Deployment Tests - Run on main branch only
  # ============================================================================
  staging-tests:
    name: Staging GCP Deployment Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./gdw_data_core
          pip install -e ./deployments
          pip install pytest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_STAGING_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'beta'

      - name: Run GCP deployment validation
        env:
          GCP_TEST_PROJECT: ${{ secrets.GCP_STAGING_PROJECT }}
          GCP_TEST_REGION: ${{ env.GCP_REGION }}
          GCP_TEST_BUCKET: ${{ secrets.GCP_STAGING_BUCKET }}
        run: |
          pytest deployments/em/tests/integration/ \
            -v \
            -m "requires_gcp" || true
        continue-on-error: true

  # ============================================================================
  # Test Results Summary
  # ============================================================================
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, dag-tests, code-quality, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary:"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Integration Tests: ${{ needs.integration-tests.result }}"
          echo "- DAG Tests: ${{ needs.dag-tests.result }}"
          echo "- Code Quality: ${{ needs.code-quality.result }}"
          echo "- Security Scan: ${{ needs.security-scan.result }}"

      - name: Fail if critical tests failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.dag-tests.result == 'failure'
        run: exit 1

      - name: Success notification
        if: success()
        run: echo "✅ All critical tests passed!"


