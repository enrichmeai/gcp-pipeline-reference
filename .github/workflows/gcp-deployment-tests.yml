name: GCP Deployment Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly comprehensive tests at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.11"
  GCP_REGION: "us-central1"

jobs:
  # ============================================================================
  # Unit Tests - Fast feedback, no external resources
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blueprint/setup/requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest blueprint/components/tests/unit/ \
            -v \
            --cov=blueprint/components \
            --cov=gdw_data_core \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not requires_gcp"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # Integration Tests - GCP services mocked
  # ============================================================================
  integration-tests:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blueprint/setup/requirements-test.txt

      - name: Run GCP client integration tests
        run: |
          pytest blueprint/components/tests/integration/test_gcp_clients.py \
            -v \
            -m "integration"

      - name: Run DAG deployment validation
        run: |
          pytest blueprint/components/tests/unit/orchestration/test_dag_deployment.py \
            -v

      - name: Generate coverage report
        if: always()
        run: |
          pytest blueprint/components/tests/integration/ \
            -v \
            --cov=blueprint/components \
            --cov-report=xml \
            -m "not requires_gcp"

  # ============================================================================
  # DAG Tests - Airflow DAG parsing and validation
  # ============================================================================
  dag-tests:
    name: DAG Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blueprint/setup/requirements-test.txt

      - name: Run DAG tests
        run: |
          pytest blueprint/components/tests/unit/orchestration/ \
            -v \
            --tb=short

      - name: Test DAG instantiation
        run: |
          python -c "
          from blueprint.components.loa_pipelines.dag_template import create_loa_dag
          dag = create_loa_dag(
              job_name='test',
              input_pattern='gs://bucket/test_*',
              output_table='project:dataset.test'
          )
          assert dag is not None
          assert len(dag.task_dict) == 6
          print('✅ DAG instantiation test passed')
          "

  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 pylint mypy isort

      - name: Run Black (code formatting check)
        run: black --check blueprint/components gdw_data_core
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: isort --check-only blueprint/components gdw_data_core
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: flake8 blueprint/components gdw_data_core --max-line-length=100
        continue-on-error: true

      - name: Run Pylint
        run: pylint blueprint/components --disable=R,C,W --fail-under=8.0
        continue-on-error: true

      - name: Run mypy (type checking)
        run: mypy blueprint/components gdw_data_core --ignore-missing-imports
        continue-on-error: true

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r blueprint/components gdw_data_core -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run Safety (dependency vulnerability check)
        run: |
          pip install safety
          safety check --json > safety-report.json || true
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ============================================================================
  # Performance Tests - Run nightly
  # ============================================================================
  performance-tests:
    name: Performance & Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[performance]')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blueprint/setup/requirements-test.txt

      - name: Run performance benchmarks
        run: |
          pytest blueprint/components/tests/performance/ \
            -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json
        continue-on-error: true

      - name: Run chaos engineering tests
        run: |
          pytest blueprint/components/tests/chaos/ \
            -v
        continue-on-error: true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-reports
          path: benchmark-results.json

  # ============================================================================
  # Staging GCP Deployment Tests - Run on main branch only
  # ============================================================================
  staging-tests:
    name: Staging GCP Deployment Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blueprint/setup/requirements-test.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_STAGING_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          install_components: 'beta'

      - name: Run GCP deployment validation
        env:
          GCP_TEST_PROJECT: ${{ secrets.GCP_STAGING_PROJECT }}
          GCP_TEST_REGION: ${{ env.GCP_REGION }}
          GCP_TEST_BUCKET: ${{ secrets.GCP_STAGING_BUCKET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          pytest blueprint/components/tests/integration/test_gcp_deployment.py \
            -v \
            -m "requires_gcp" || true
          
          # Run BDD E2E tests in staging
          pytest blueprint/components/tests/bdd/step_definitions/test_pipeline_e2e.py \
            -v \
            -m "requires_gcp" || true
        continue-on-error: true

  # ============================================================================
  # Test Results Summary
  # ============================================================================
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, dag-tests, code-quality, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary:"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Integration Tests: ${{ needs.integration-tests.result }}"
          echo "- DAG Tests: ${{ needs.dag-tests.result }}"
          echo "- Code Quality: ${{ needs.code-quality.result }}"
          echo "- Security Scan: ${{ needs.security-scan.result }}"

      - name: Fail if critical tests failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.dag-tests.result == 'failure'
        run: exit 1

      - name: Success notification
        if: success()
        run: echo "✅ All critical tests passed!"


