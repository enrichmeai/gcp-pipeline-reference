name: Test & Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_loa
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install pytest pytest-cov pytest-mock

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 blueprint/components --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 blueprint/components --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        black --check blueprint/components || true

    - name: Run unit tests
      run: |
        pytest blueprint/components/tests/unit/ -v --tb=short
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: test_loa
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpass

    - name: Run integration tests
      run: |
        pytest blueprint/components/tests/integration/ -v --tb=short
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: test_loa
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpass

    - name: Run local tests (with docker-compose)
      run: |
        cd blueprint/components/tests/local
        docker-compose up -d
        sleep 10  # Wait for services to be healthy
        pytest test_local_pipeline.py -v --tb=short
        docker-compose down

    - name: Generate coverage report
      run: |
        pytest blueprint/components/tests/ \
          --cov=blueprint/components/loa_common \
          --cov=blueprint/components/loa_pipelines \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        flags: unittests
        name: codecov-umbrella
        verbose: true

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install security tools
      run: |
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r blueprint/components --severity-level medium || true

    - name: Check for known vulnerabilities
      run: |
        pip install -q -r requirements-dev.txt
        safety check || true

  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy

    - name: Run pylint
      run: |
        pylint blueprint/components --exit-zero --max-line-length=120

    - name: Run mypy type checking
      run: |
        mypy blueprint/components --ignore-missing-imports || true

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image for validation API
      uses: docker/build-push-action@v4
      with:
        context: ./blueprint/components
        file: ./blueprint/components/Dockerfile.validation-api
        push: false
        tags: |
          loa-validation-api:latest
          loa-validation-api:${{ github.sha }}

    - name: Build Docker image for data-quality API
      uses: docker/build-push-action@v4
      with:
        context: ./blueprint/components
        file: ./blueprint/components/Dockerfile.data-quality-api
        push: false
        tags: |
          loa-data-quality-api:latest
          loa-data-quality-api:${{ github.sha }}

  results:
    runs-on: ubuntu-latest
    needs: [test, security, quality, docker-build]
    if: always()

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "Tests failed!"
          exit 1
        fi

    - name: All checks passed ✅
      run: |
        echo "All checks passed successfully!"
        echo "Ready for deployment!"

