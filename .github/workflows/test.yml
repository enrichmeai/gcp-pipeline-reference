name: Test All

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # Test Libraries
  # ==========================================================================
  test-libraries:
    name: Test Libraries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        library: [gcp-pipeline-core, gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock pytest-cov
        # Core is needed by all dependent libraries
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        cd gcp-pipeline-libraries/${{ matrix.library }}
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short
        else
          echo "No tests found for ${{ matrix.library }}"
        fi

  # ==========================================================================
  # Test Generic Ingestion (original-data-to-bigqueryload)
  # ==========================================================================
  test-ingestion:
    name: Test Generic Ingestion
    runs-on: ubuntu-latest
    needs: [test-libraries]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install framework from local source
      run: |
        python -m pip install --upgrade pip
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
        pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

    - name: Install deployment
      run: |
        cd deployments/original-data-to-bigqueryload
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        cd deployments/original-data-to-bigqueryload
        PYTHONPATH=src pytest tests/unit -v --tb=short

  # ==========================================================================
  # Test Generic Orchestration (data-pipeline-orchestrator)
  # ==========================================================================
  test-orchestration:
    name: Test Generic Orchestration
    runs-on: ubuntu-latest
    needs: [test-libraries]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install framework from local source
      run: |
        python -m pip install --upgrade pip
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        pip install -e gcp-pipeline-libraries/gcp-pipeline-orchestration
        pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

    - name: Install deployment
      run: |
        cd deployments/data-pipeline-orchestrator
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        cd deployments/data-pipeline-orchestrator
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short
        else
          echo "No tests directory - DAG syntax check only"
        fi

    - name: Validate DAG syntax
      run: |
        cd deployments/data-pipeline-orchestrator
        for dag in dags/*.py; do
          echo "Checking $dag..."
          python "$dag" && echo "  OK" || echo "  WARN: $dag may require full Airflow env"
        done

  # ==========================================================================
  # Test Postgres CDC Streaming (postgres-cdc-streaming)
  # ==========================================================================
  test-cdc-streaming:
    name: Test CDC Streaming
    runs-on: ubuntu-latest
    needs: [test-libraries]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install framework from local source
      run: |
        python -m pip install --upgrade pip
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
        pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

    - name: Install deployment
      run: |
        cd deployments/postgres-cdc-streaming
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        cd deployments/postgres-cdc-streaming
        if [ -d "tests" ]; then
          PYTHONPATH=src pytest tests/ -v --tb=short
        else
          echo "No tests directory - import check only"
          PYTHONPATH=src python -c "from streaming_pipeline.pipeline import runner; print('Import OK')" || true
        fi

  # ==========================================================================
  # Summary
  # ==========================================================================
  test-summary:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-libraries, test-ingestion, test-orchestration, test-cdc-streaming]
    if: always()

    steps:
    - name: Summary
      run: |
        echo "Test Summary"
        echo "============"
        echo "  Libraries (Core, Beam, Orch, Transform, Tester): ${{ needs.test-libraries.result }}"
        echo "  Generic Ingestion (original-data-to-bigqueryload): ${{ needs.test-ingestion.result }}"
        echo "  Generic Orchestration (data-pipeline-orchestrator): ${{ needs.test-orchestration.result }}"
        echo "  CDC Streaming (postgres-cdc-streaming): ${{ needs.test-cdc-streaming.result }}"

        if [ "${{ needs.test-libraries.result }}" == "failure" ] || \
           [ "${{ needs.test-ingestion.result }}" == "failure" ]; then
          echo "FAIL: Required tests failed"
          exit 1
        fi
        echo "All required tests passed"
