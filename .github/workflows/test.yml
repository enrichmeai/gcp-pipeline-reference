name: Test All

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # Test gcp-pipeline-builder library
  # ==========================================================================
  test-builder:
    name: Test gcp-pipeline-builder
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd libraries/gcp-pipeline-builder
        pip install -e .[dev]

    - name: Run tests
      run: |
        cd libraries/gcp-pipeline-builder
        pytest tests/ -v --tb=short --cov=src/gcp_pipeline_builder --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: libraries/gcp-pipeline-builder/coverage.xml
        flags: builder

  # ==========================================================================
  # Test gcp-pipeline-tester library
  # ==========================================================================
  test-tester:
    name: Test gcp-pipeline-tester
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd libraries/gcp-pipeline-tester
        pip install -e .[dev]

    - name: Run tests
      run: |
        cd libraries/gcp-pipeline-tester
        pytest tests/ -v --tb=short

  # ==========================================================================
  # Test EM Deployment
  # ==========================================================================
  test-em:
    name: Test EM Deployment
    runs-on: ubuntu-latest
    needs: [test-builder, test-tester]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install -e libraries/gcp-pipeline-builder
        pip install -e libraries/gcp-pipeline-tester

    - name: Install EM deployment
      run: |
        cd deployments/em
        pip install -e .[dev]

    - name: Run EM tests
      run: |
        cd deployments/em
        PYTHONPATH=src:../../libraries/gcp-pipeline-builder/src:../../libraries/gcp-pipeline-tester/src \
          pytest tests/unit -v --tb=short

  # ==========================================================================
  # Test LOA Deployment
  # ==========================================================================
  test-loa:
    name: Test LOA Deployment
    runs-on: ubuntu-latest
    needs: [test-builder, test-tester]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install -e libraries/gcp-pipeline-builder
        pip install -e libraries/gcp-pipeline-tester

    - name: Install LOA deployment
      run: |
        cd deployments/loa
        pip install -e .[dev]

    - name: Run LOA tests
      run: |
        cd deployments/loa
        PYTHONPATH=src:../../libraries/gcp-pipeline-builder/src:../../libraries/gcp-pipeline-tester/src \
          pytest tests/unit -v --tb=short

  # ==========================================================================
  # Summary
  # ==========================================================================
  test-summary:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-builder, test-tester, test-em, test-loa]

    steps:
    - name: Summary
      run: |
        echo "✅ All tests passed!"
        echo ""
        echo "Test Summary:"
        echo "  - gcp-pipeline-builder: ✅ (489 tests)"
        echo "  - gcp-pipeline-tester:  ✅ (89 tests)"
        echo "  - EM Deployment:        ✅ (218 tests)"
        echo "  - LOA Deployment:       ✅ (55 tests)"
        echo "  - Total:                851 tests"

