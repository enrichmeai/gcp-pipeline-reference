name: Test All

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # Test Libraries
  # ==========================================================================
  test-libraries:
    name: Test Libraries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        library: [gcp-pipeline-core, gcp-pipeline-beam, gcp-pipeline-orchestration, gcp-pipeline-transform, gcp-pipeline-tester]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock pytest-cov
        # Core is needed by beam and orchestration
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        cd gcp-pipeline-libraries/${{ matrix.library }}
        pip install -e .[dev] || pip install -e .

    - name: Run tests
      run: |
        cd gcp-pipeline-libraries/${{ matrix.library }}
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short
        else
          echo "No tests found for ${{ matrix.library }}"
        fi

  # ==========================================================================
  # Test EM Ingestion Deployment
  # ==========================================================================
  test-em-ingestion:
    name: Test EM Ingestion
    runs-on: ubuntu-latest
    needs: [test-libraries]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
        pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

    - name: Install EM deployment
      run: |
        cd deployments_embedded/em-ingestion
        pip install -e .[dev]

    - name: Run EM tests
      run: |
        cd deployments_embedded/em-ingestion
        PYTHONPATH=src pytest tests/unit -v --tb=short

  # ==========================================================================
  # Test LOA Ingestion Deployment
  # ==========================================================================
  test-loa-ingestion:
    name: Test LOA Ingestion
    runs-on: ubuntu-latest
    needs: [test-libraries]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install -e gcp-pipeline-libraries/gcp-pipeline-core
        pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
        pip install -e gcp-pipeline-libraries/gcp-pipeline-tester

    - name: Install LOA deployment
      run: |
        cd deployments_embedded/loa-ingestion
        pip install -e .[dev]

    - name: Run LOA tests
      run: |
        cd deployments_embedded/loa-ingestion
        PYTHONPATH=src pytest tests/unit -v --tb=short

  # ==========================================================================
  # Summary
  # ==========================================================================
  test-summary:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-libraries, test-em-ingestion, test-loa-ingestion]

    steps:
    - name: Summary
      run: |
        echo "✅ All tests passed!"
        echo ""
        echo "Test Summary:"
        echo "  - Libraries (Core, Beam, Orch, Trans, Tester): ✅"
        echo "  - EM Ingestion Deployment: ✅"
        echo "  - LOA Ingestion Deployment: ✅"

