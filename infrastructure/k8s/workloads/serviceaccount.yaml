---
# Service account for Airflow workers
# Uses Workload Identity to trigger Dataflow jobs and run BigQuery queries
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-worker
  namespace: airflow
  annotations:
    # Replace PROJECT_ID with your GCP project
    iam.gke.io/gcp-service-account: airflow-sa@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: airflow-worker
    app.kubernetes.io/part-of: data-pipeline
---
# Role for Airflow service account (minimal k8s permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-worker-role
  namespace: airflow
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
# Bind role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-worker-rolebinding
  namespace: airflow
subjects:
  - kind: ServiceAccount
    name: airflow-worker
    namespace: airflow
roleRef:
  kind: Role
  name: airflow-worker-role
  apiGroup: rbac.authorization.k8s.io

